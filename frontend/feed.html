<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feed · Diwanet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css">
  <style>
    .layout { max-width: 1140px; margin: 0 auto; display: grid; grid-template-columns: 220px 1fr 260px; gap: 24px; padding: 28px 24px; align-items: start; }
    .sidebar-left { position: sticky; top: 80px; }
    .sidebar-right { position: sticky; top: 80px; display: grid; gap: 12px; }
    .sidebar-card { background: white; border: 1px solid var(--border); border-radius: 16px; padding: 16px; box-shadow: var(--shadow); margin-bottom: 12px; }
    .sidebar-card h3 { font-size: 0.76rem; font-weight: 700; color: var(--muted2); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 10px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 10px; font-size: 0.88rem; font-weight: 500; color: var(--muted); cursor: pointer; transition: all 0.15s; text-decoration: none; border: none; background: none; font-family: 'DM Sans', sans-serif; width: 100%; text-align: left; }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: var(--accent-light); color: var(--accent); font-weight: 700; }

    /* Compose */
    .compose { background: white; border: 1px solid var(--border); border-radius: 16px; padding: 18px; display: none; box-shadow: var(--shadow); margin-bottom: 14px; }
    .compose.visible { display: block; }
    .compose-top { display: flex; gap: 12px; }
    .compose textarea { width: 100%; background: var(--surface2); border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; font-size: 0.92rem; color: var(--text); font-family: 'DM Sans', sans-serif; resize: none; min-height: 90px; transition: border-color 0.2s; }
    .compose textarea:focus { outline: none; border-color: var(--accent); background: white; }
    .compose-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
    .tag-input { background: var(--surface2); border: 1.5px solid var(--border); border-radius: 8px; padding: 7px 10px; font-size: 0.84rem; color: var(--text); font-family: 'DM Sans', sans-serif; width: 180px; }
    .tag-input:focus { outline: none; border-color: var(--accent); }
    .post-btn { padding: 9px 20px; border-radius: 999px; border: none; background: var(--accent); color: white; font-weight: 700; font-size: 0.88rem; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.2s; }
    .post-btn:hover { background: var(--accent-dark); }
    .post-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Posts */
    .feed { display: grid; gap: 14px; }
    .post { background: white; border: 1px solid var(--border); border-radius: 16px; overflow: hidden; box-shadow: var(--shadow); transition: all 0.2s; }
    .post:hover { box-shadow: var(--shadow-lg); }
    .post-header { padding: 16px 18px 0; display: flex; align-items: center; gap: 12px; }
    .post-avatar { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-dark)); display: grid; place-items: center; font-weight: 800; color: white; font-size: 0.95rem; flex-shrink: 0; text-decoration: none; }
    .post-avatar.individual { background: linear-gradient(135deg, #60a5fa, #3b82f6); }
    .post-meta { flex: 1; min-width: 0; }
    .post-author { font-weight: 700; font-size: 0.93rem; }
    .post-author a { color: var(--text); text-decoration: none; }
    .post-author a:hover { color: var(--accent); }
    .post-time { font-size: 0.78rem; color: var(--muted2); margin-top: 2px; }
    .post-type-badge { font-size: 0.74rem; padding: 3px 9px; border-radius: 999px; background: var(--accent-light); color: var(--accent-dark); border: 1px solid rgba(15,76,129,0.2); font-weight: 600; }
    .post-body { padding: 12px 18px; }
    .post-content { font-size: 0.93rem; line-height: 1.65; white-space: pre-wrap; }
    .post-image { width: 100%; max-height: 380px; object-fit: cover; border-radius: 10px; margin-top: 12px; }
    .shared-post { margin-top: 12px; padding: 14px; border-radius: 12px; background: var(--surface2); border: 1px solid var(--border); border-left: 3px solid var(--accent); }
    .shared-post .shared-from { font-size: 0.78rem; color: var(--muted); margin-bottom: 6px; }
    .shared-post .shared-from a { color: var(--accent); text-decoration: none; font-weight: 600; }
    .shared-post .shared-content { font-size: 0.88rem; color: var(--text); }
    .post-actions { padding: 10px 18px; display: flex; align-items: center; gap: 4px; border-top: 1px solid var(--border); }
    .action-btn { display: flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 999px; border: none; background: none; color: var(--muted); font-size: 0.84rem; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
    .action-btn:hover { background: var(--surface2); color: var(--text); }
    .action-btn.liked { color: var(--danger); font-weight: 600; }
    .action-sep { width: 1px; height: 18px; background: var(--border); margin: 0 4px; }

    /* Comments */
    .comments-box { border-top: 1px solid var(--border); padding: 14px 18px; display: none; background: var(--surface2); }
    .comments-box.open { display: block; }
    .comment-list { display: grid; gap: 10px; margin-bottom: 12px; }
    .comment { display: flex; gap: 10px; }
    .comment-avatar { width: 30px; height: 30px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-dark)); display: grid; place-items: center; font-size: 0.75rem; font-weight: 700; color: white; flex-shrink: 0; }
    .comment-avatar.individual { background: linear-gradient(135deg, #60a5fa, #3b82f6); }
    .comment-bubble { background: white; border-radius: 12px; padding: 9px 12px; flex: 1; border: 1px solid var(--border); }
    .comment-name { font-size: 0.8rem; font-weight: 700; margin-bottom: 3px; }
    .comment-name a { color: var(--text); text-decoration: none; }
    .comment-name a:hover { color: var(--accent); }
    .comment-text { font-size: 0.87rem; line-height: 1.5; }
    .comment-time { font-size: 0.74rem; color: var(--muted2); margin-top: 4px; }
    .comment-input-row { display: flex; gap: 8px; }
    .comment-input { flex: 1; background: white; border: 1.5px solid var(--border); border-radius: 10px; padding: 9px 12px; font-size: 0.87rem; color: var(--text); font-family: 'DM Sans', sans-serif; resize: none; min-height: 40px; max-height: 200px; overflow-y: auto; }
    .comment-input:focus { outline: none; border-color: var(--accent); }
    .comment-send { padding: 9px 16px; border-radius: 10px; border: none; background: var(--accent); color: white; font-size: 0.84rem; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; }

    /* Share modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(15,76,129,0.3); display: none; place-items: center; z-index: 200; backdrop-filter: blur(4px); }
    .modal-overlay.open { display: grid; }
    .modal { background: white; border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; width: 90%; max-width: 480px; box-shadow: var(--shadow-lg); }
    .modal h3 { font-family: 'DM Serif Display', serif; font-size: 1.3rem; margin-bottom: 14px; }
    .modal .original-preview { background: var(--accent-light); border-radius: 10px; padding: 12px; margin-bottom: 14px; font-size: 0.87rem; color: var(--muted); border-left: 3px solid var(--accent); }
    .modal .original-preview strong { display: block; color: var(--text); margin-bottom: 5px; font-size: 0.84rem; }
    .modal textarea { width: 100%; background: var(--surface2); border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; font-size: 0.9rem; color: var(--text); font-family: 'DM Sans', sans-serif; resize: none; min-height: 100px; }
    .modal textarea:focus { outline: none; border-color: var(--accent); }
    .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 14px; }
    .btn-cancel { padding: 9px 18px; border-radius: 999px; border: 1.5px solid var(--border); background: white; color: var(--muted); cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.87rem; }
    .btn-share-confirm { padding: 9px 20px; border-radius: 999px; border: none; background: var(--accent); color: white; font-weight: 700; font-size: 0.87rem; cursor: pointer; font-family: 'DM Sans', sans-serif; }

    /* Sidebar widgets */
    .widget { background: white; border: 1px solid var(--border); border-radius: 16px; padding: 18px; box-shadow: var(--shadow); }
    .widget h3 { font-size: 0.76rem; font-weight: 700; color: var(--muted2); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 14px; }
    .business-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); text-decoration: none; transition: all 0.15s; }
    .business-item:last-child { border-bottom: none; }
    .business-item:hover .b-name { color: var(--accent); }
    .b-avatar { width: 34px; height: 34px; border-radius: 10px; background: linear-gradient(135deg, var(--accent), var(--accent-dark)); display: grid; place-items: center; font-weight: 700; color: white; font-size: 0.85rem; flex-shrink: 0; }
    .b-name { font-size: 0.88rem; font-weight: 600; color: var(--text); }
    .b-cat { font-size: 0.76rem; color: var(--muted2); }
    .guest-banner { background: var(--accent-light); border: 1px solid rgba(15,76,129,0.2); border-radius: 16px; padding: 20px; text-align: center; }
    .guest-banner h3 { font-family: 'DM Serif Display', serif; font-size: 1.1rem; margin-bottom: 8px; }
    .guest-banner p { font-size: 0.84rem; color: var(--muted); margin-bottom: 16px; line-height: 1.5; }
    .guest-banner .actions { display: flex; flex-direction: column; gap: 8px; }
    .guest-banner a { display: block; padding: 10px; border-radius: 12px; font-size: 0.88rem; font-weight: 700; text-decoration: none; transition: all 0.2s; }
    .a-primary { background: var(--accent); color: white; }
    .a-ghost { background: white; color: var(--text); border: 1.5px solid var(--border); }

    /* Toast */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--text); border-radius: 12px; padding: 12px 20px; font-size: 0.88rem; font-weight: 600; color: white; box-shadow: var(--shadow-lg); transition: transform 0.3s; z-index: 300; }
    .toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 1000px) { .layout { grid-template-columns: 1fr; } .sidebar-left, .sidebar-right { position: static; } }
    @media (max-width: 640px) { .layout { padding: 16px; } }

    /* Mentions Dropdown */
    .mention-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      cursor: pointer;
      transition: background 0.15s;
      border-bottom: 1px solid var(--border);
    }
    .mention-item:last-child {
      border-bottom: none;
    }
    .mention-item:hover {
      background: var(--accent-light);
    }
    .mention-avatar {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      display: grid;
      place-items: center;
      font-weight: 700;
      color: white;
      font-size: 0.8rem;
      flex-shrink: 0;
      overflow: hidden;
    }
    .mention-name {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
    }
    .mention-slug {
      font-size: 0.76rem;
      color: var(--muted2);
      margin-top: 1px;
    }
  </style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <a href="index.html" class="brand">
      <div class="brand-mark">D</div>
      <span class="brand-name">Diwanet</span>
    </a>
    <nav class="topbar-nav">
      <a href="feed.html" class="active">Feed</a>
      <a href="categories.html">Explore</a>
    </nav>
    <div class="topbar-actions" id="authArea"></div>
  </div>
</header>

<div class="layout">
  <aside class="sidebar-left">
    <div class="sidebar-card">
      <h3>Navigation</h3>
      <a class="nav-item active" href="feed.html"><span>🏠</span> Feed</a>
      <a class="nav-item" href="categories.html"><span>🔍</span> Explore</a>
      <a class="nav-item" id="profileNavLink" href="#"><span>👤</span> Profile</a>
      <a class="nav-item" id="messagesNavLink" href="messages.html" style="display: none;"><span>💬</span> Messages <span id="msgBadge"></span></a>
      <button class="nav-item" id="notifBtn"><span>🔔</span> Notifications <span id="notifBadge"></span></button>
    </div>
  </aside>

  <main>
    <div class="compose" id="composeBox">
      <div class="compose-top" style="position:relative;">
        <div class="avatar avatar-md" id="composeAvatar">B</div>
        <div style="flex:1;position:relative;">
          <textarea id="composeText" placeholder="Share something with your followers... Use @slug to tag other businesses."></textarea>
          <div id="mentionsDropdown" style="display:none;position:absolute;top:100%;left:0;right:0;background:white;border:1.5px solid var(--border);border-radius:12px;box-shadow:var(--shadow-lg);z-index:1000;max-height:200px;overflow-y:auto;box-sizing:border-box;"></div>
        </div>
      </div>
      <div class="compose-footer">
        <input class="tag-input" id="tagInput" placeholder="@business-slug (optional)" />
        <button class="post-btn" id="postBtn" onclick="submitPost()">Post</button>
      </div>
    </div>
    <div class="feed" id="feedContainer"><div class="loading">Loading feed...</div></div>
    <div id="loadMoreContainer" style="text-align:center;padding:20px;display:none;">
      <button class="btn btn-ghost btn-sm" onclick="loadMore()">Load more</button>
    </div>
  </main>

  <aside class="sidebar-right">
    <div id="rightSidebarContent"></div>
  </aside>
</div>

<div class="modal-overlay" id="shareModal">
  <div class="modal">
    <h3>Share this post</h3>
    <div class="original-preview" id="sharePreview"></div>
    <textarea id="shareComment" placeholder="Add your thoughts... (optional)"></textarea>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeShare()">Cancel</button>
      <button class="btn-share-confirm" onclick="confirmShare()">Share</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="assets/js/auth.js"></script>
<script>
let page = 1, hasMore = false, shareTargetId = null;

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2800);
}

function setupUI() {
  const user = getUser(), business = getBusiness(), authArea = document.getElementById("authArea");
  if (user) {
    const name = business ? business.business_name : `${user.first_name} ${user.last_name}`;
    const initial = name.charAt(0).toUpperCase();
    const profileLink = user.role === "business_owner" ? `/b/${business?.slug}` : `profile.html?id=${user.id}`;
    authArea.innerHTML = `
      <a href="${profileLink}" class="btn btn-ghost btn-sm">${initial} ${escHtml(name)}</a>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">Sign out</button>`;
    const navLink = document.getElementById("profileNavLink");
    navLink.href = user.role === "business_owner" && business ? `/b/${business.slug}` : `profile.html?id=${user.id}`;
    
    // Show messages sidebar nav item
    const msgLink = document.getElementById("messagesNavLink");
    if (msgLink) msgLink.style.display = "block";

    if (user.role === "business_owner" && business) {
      document.getElementById("composeBox").classList.add("visible");
      document.getElementById("composeAvatar").textContent = business.business_name.charAt(0).toUpperCase();
      setupMentionsAutocomplete();
    }
    renderFollowingWidget();
    loadNotifCount();
    loadUnreadMessagesCount();
  } else {
    authArea.innerHTML = `
      <a href="login.html" class="btn btn-ghost btn-sm">Sign in</a>
      <a href="signup.html" class="btn btn-primary btn-sm">Sign up</a>`;
    document.getElementById("profileNavLink").style.display = "none";
    const msgLink = document.getElementById("messagesNavLink");
    if (msgLink) msgLink.style.display = "none";
    renderGuestSidebar();
  }
}

function renderGuestSidebar() {
  document.getElementById("rightSidebarContent").innerHTML = `
    <div class="guest-banner">
      <h3>Join Diwanet</h3>
      <p>Follow businesses, like and comment on posts.</p>
      <div class="actions">
        <a href="signup.html" class="a-primary">Create free account</a>
        <a href="login.html" class="a-ghost">Sign in</a>
      </div>
    </div>`;
}

async function renderFollowingWidget() {
  const user = getUser();
  if (!getToken() || !user) return;
  document.getElementById("rightSidebarContent").innerHTML = `<div class="widget"><div class="loading" style="padding:16px;">Loading...</div></div>`;
  try {
    const res = await fetch(`${API}/api/profile/${user.id}`, { headers: authHeaders() });
    const data = await res.json();
    if (!data.success) return;
    const following = data.following || [];
    const html = following.length > 0
      ? following.slice(0, 6).map(b => `
          <a class="business-item" href="/b/${b.slug}">
            <div class="b-avatar">${b.business_name.charAt(0)}</div>
            <div><div class="b-name">${escHtml(b.business_name)}</div><div class="b-cat">${escHtml(b.category_name || "")}</div></div>
          </a>`).join("")
      : `<p style="font-size:0.84rem;color:var(--muted2);">Not following anyone yet. <a href="categories.html" style="color:var(--accent);text-decoration:none;font-weight:600;">Explore</a></p>`;
    document.getElementById("rightSidebarContent").innerHTML = `
      <div class="widget"><h3>Following</h3>${html}
        ${following.length > 6 ? `<a href="profile.html?id=${user.id}" style="font-size:0.82rem;color:var(--accent);text-decoration:none;display:block;margin-top:10px;font-weight:600;">See all →</a>` : ""}
      </div>`;
  } catch {}
}

async function loadNotifCount() {
  if (!getToken()) return;
  try {
    const res = await fetch(`${API}/api/notifications`, { headers: authHeaders() });
    const data = await res.json();
    if (data.unread_count > 0) {
      const badge = document.getElementById("notifBadge");
      badge.textContent = data.unread_count;
      badge.style.cssText = "background:var(--danger);color:white;border-radius:999px;padding:1px 7px;font-size:0.74rem;font-weight:700;margin-left:4px;";
    }
  } catch {}
}

async function loadUnreadMessagesCount() {
  if (!getToken()) return;
  try {
    const res = await fetch(`${API}/api/messages/conversations`, { headers: authHeaders() });
    const data = await res.json();
    if (data.success && data.conversations) {
      const unreadCount = data.conversations.reduce((sum, c) => sum + (c.unread_count || 0), 0);
      if (unreadCount > 0) {
        const badge = document.getElementById("msgBadge");
        if (badge) {
          badge.textContent = unreadCount;
          badge.style.cssText = "background:var(--danger);color:white;border-radius:999px;padding:1px 7px;font-size:0.74rem;font-weight:700;margin-left:4px;";
        }
      }
    }
  } catch {}
}

async function loadFeed(reset = false) {
  if (reset) { page = 1; document.getElementById("feedContainer").innerHTML = '<div class="loading">Loading...</div>'; }
  const headers = getToken() ? { "Authorization": "Bearer " + getToken() } : {};
  try {
    const res = await fetch(`${API}/api/feed?page=${page}`, { headers });
    const data = await res.json();
    if (!data.success) { document.getElementById("feedContainer").innerHTML = '<div class="loading">Could not load feed.</div>'; return; }
    hasMore = data.has_more;
    const posts = data.posts;
    if (reset && posts.length === 0) {
      document.getElementById("feedContainer").innerHTML = `<div class="empty-state"><h3>No posts yet</h3><p>Follow some businesses to see their posts. <a href="categories.html" style="color:var(--accent);text-decoration:none;font-weight:600;">Explore</a></p></div>`;
      return;
    }
    const html = posts.map(renderPost).join("");
    if (reset) { document.getElementById("feedContainer").innerHTML = html; }
    else { document.getElementById("feedContainer").insertAdjacentHTML("beforeend", html); }
    document.getElementById("loadMoreContainer").style.display = hasMore ? "block" : "none";
  } catch { document.getElementById("feedContainer").innerHTML = '<div class="loading">Connection error.</div>'; }
}

function loadMore() { page++; loadFeed(false); }

function renderPost(p) {
  const isShare = p.post_type === "share", isBiz = p.author_type === "business";
  const authorName = isBiz ? escHtml(p.business_name) : escHtml(`${p.first_name} ${p.last_name}`);
  const authorLink = isBiz ? `/b/${p.business_slug}` : `profile.html?id=${p.user_id}`;
  const avatarClass = isBiz ? "post-avatar" : "post-avatar individual";
  const sharedBlock = isShare && p.original_post
    ? `<div class="shared-post"><div class="shared-from">Originally posted by <a href="/b/${p.original_post.business_slug}">${escHtml(p.original_post.business_name)}</a></div><div class="shared-content">${escHtml(p.original_post.content).substring(0, 200)}${p.original_post.content.length > 200 ? "…" : ""}</div></div>`
    : "";
  const imgUrl = p.image_url || (p.post_type === "share" && p.original_post?.image_url ? p.original_post.image_url : null);
  const imageBlock = imgUrl ? `<img class="post-image" src="${escHtml(imgUrl)}" alt="" loading="lazy" />` : "";
  const user = getUser(), canInteract = !!user;
  const likedClass = p.is_liked ? "action-btn liked" : "action-btn";
  const likedIcon = p.is_liked ? "❤️" : "🤍";
  const actionsHtml = canInteract
    ? `<button class="${likedClass}" id="like-${p.id}" onclick="toggleLike(${p.id})">${likedIcon} <span class="count" id="like-count-${p.id}">${p.like_count}</span></button>
       <div class="action-sep"></div>
       <button class="action-btn" onclick="toggleComments(${p.id})">💬 <span>${p.comment_count}</span></button>
       <div class="action-sep"></div>
       <button class="action-btn" onclick="openShare(${p.id},'${escAttr(authorName)}','${escAttr((p.content || "").substring(0, 80))}')">🔁 <span>${p.share_count}</span></button>`
    : `<span class="action-btn" style="cursor:default;">🤍 ${p.like_count}</span>
       <div class="action-sep"></div>
       <span class="action-btn" style="cursor:default;">💬 ${p.comment_count}</span>
       <div class="action-sep"></div>
       <a href="login.html" class="action-btn" style="text-decoration:none;color:var(--accent);font-weight:600;">Sign in to interact</a>`;

  return `<article class="post" id="post-${p.id}">
    <div class="post-header">
      <a href="${authorLink}" class="avatar avatar-md ${isBiz ? '' : 'individual'}">${p.logo_url ? `<img src="${p.logo_url}" alt="">` : authorName.charAt(0)}</a>
      <div class="post-meta">
        <div class="post-author"><a href="${authorLink}">${authorName}</a></div>
        <div class="post-time">${timeAgo(p.created_at)}${isShare ? " · shared a post" : ""}</div>
      </div>
      ${isShare ? '<span class="post-type-badge">🔁 Share</span>' : ""}
    </div>
    <div class="post-body">
      <div class="post-content">${escHtml(p.content || "")}</div>
      ${imageBlock}${sharedBlock}
    </div>
    <div class="post-actions">${actionsHtml}</div>
    <div class="comments-box" id="comments-${p.id}">
      <div class="comment-list" id="comment-list-${p.id}"></div>
      ${canInteract
        ? `<div class="comment-input-row"><textarea class="comment-input" id="comment-input-${p.id}" placeholder="Write a comment..." rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea><button class="comment-send" onclick="submitComment(${p.id})">Send</button></div>`
        : `<a href="login.html" style="font-size:0.84rem;color:var(--accent);text-decoration:none;font-weight:600;">Sign in to comment</a>`}
    </div>
  </article>`;
}

async function toggleLike(postId) {
  if (!getUser()) { window.location.href = "login.html"; return; }
  const btn = document.getElementById(`like-${postId}`);
  btn.disabled = true;
  try {
    const res = await fetch(`${API}/api/posts/${postId}/like`, { method: "POST", headers: authHeaders() });
    const data = await res.json();
    if (data.success) {
      btn.className = data.liked ? "action-btn liked" : "action-btn";
      btn.innerHTML = (data.liked ? "❤️" : "🤍") + ` <span class="count" id="like-count-${postId}">${data.like_count}</span>`;
    }
  } catch {}
  btn.disabled = false;
}

async function toggleComments(postId) {
  const box = document.getElementById(`comments-${postId}`);
  if (box.classList.contains("open")) { box.classList.remove("open"); return; }
  box.classList.add("open");
  await loadComments(postId);
}

async function loadComments(postId) {
  const list = document.getElementById(`comment-list-${postId}`);
  list.innerHTML = '<div style="color:var(--muted2);font-size:0.84rem;">Loading...</div>';
  const user = getUser(), biz = getBusiness();
  try {
    const res = await fetch(`${API}/api/posts/${postId}/comments`);
    const data = await res.json();
    if (!data.success || data.comments.length === 0) { list.innerHTML = '<div style="color:var(--muted2);font-size:0.84rem;">No comments yet.</div>'; return; }
    list.innerHTML = data.comments.map(c => {
      const isBiz = c.commenter_type === "business";
      const name = isBiz ? escHtml(c.business_name) : escHtml(`${c.first_name} ${c.last_name}`);
      const link = isBiz ? `/b/${c.business_slug}` : `profile.html?id=${c.commenter_user_id}`;
      const isMyComment = biz ? c.commenter_business_id === biz.id : (user && c.commenter_user_id === user.id);
      
      const likeBtn = `
        <span style="color:var(--muted2);margin:0 4px;">·</span>
        <button class="comment-action-btn comment-like-btn" onclick="toggleCommentLike(${postId},${c.id},this)" data-liked="${c.is_liked ? "1" : "0"}" style="background:none;border:none;cursor:pointer;color:${c.is_liked ? "var(--danger)" : "var(--muted2)"};font-size:0.75rem;font-weight:600;padding:0;font-family:inherit;transition:opacity 0.2s;display:inline-flex;align-items:center;gap:3px;">
          <span>${c.is_liked ? "❤️" : "🤍"}</span>
          <span>Like</span>
          <span class="like-count" style="font-weight:normal;">(${c.like_count || 0})</span>
        </button>
      `;

      const actionLinks = isMyComment ? `
        <span style="color:var(--muted2);margin:0 4px;">·</span>
        <button class="comment-action-btn" onclick="editComment(${c.id},this)" style="background:none;border:none;cursor:pointer;color:var(--accent);font-size:0.75rem;font-weight:600;padding:0;font-family:inherit;transition:opacity 0.2s;">✏️ Edit</button>
        <span style="color:var(--muted2);margin:0 4px;">·</span>
        <button class="comment-action-btn" onclick="deleteComment(${postId},${c.id},this)" style="background:none;border:none;cursor:pointer;color:var(--danger);font-size:0.75rem;font-weight:600;padding:0;font-family:inherit;transition:opacity 0.2s;">🗑️ Delete</button>
      ` : "";

      return `<div class="comment" id="comment-item-${c.id}">
        <div class="comment-avatar ${isBiz ? "" : "individual"}">${name.charAt(0)}</div>
        <div class="comment-bubble" style="flex:1;">
          <div class="comment-name"><a href="${link}">${name}</a></div>
          <div class="comment-text" id="comment-text-${c.id}">${escHtml(c.content)}</div>
          <div class="comment-time" style="display:flex;align-items:center;margin-top:4px;font-size:0.75rem;color:var(--muted2);">
            <span>${timeAgo(c.created_at)}</span>
            ${likeBtn}
            ${actionLinks}
          </div>
        </div>
      </div>`;
    }).join("");
  } catch { list.innerHTML = ""; }
}

function toggleCommentMenu(btn) {
  const dropdown = btn.nextElementSibling;
  const isOpen = dropdown.style.display === "block";
  document.querySelectorAll(".c-menu-dropdown").forEach(d => d.style.display = "none");
  dropdown.style.display = isOpen ? "none" : "block";
}

document.addEventListener("click", e => {
  if (!e.target.classList.contains("c-menu-btn")) {
    document.querySelectorAll(".c-menu-dropdown").forEach(d => d.style.display = "none");
  }
});

function editComment(commentId, btn) {
  btn.closest(".c-menu-dropdown").style.display = "none";
  const textEl = document.getElementById("comment-text-" + commentId);
  const original = textEl.textContent;
  textEl.innerHTML = `
    <textarea style="width:100%;border:1.5px solid var(--accent);border-radius:8px;padding:8px 10px;font-size:0.87rem;font-family:'DM Sans',sans-serif;resize:none;margin-top:4px;" rows="2">${original}</textarea>
    <div style="display:flex;gap:6px;margin-top:6px;">
      <button onclick="saveEditComment(${commentId},this)" style="padding:5px 14px;border-radius:999px;background:var(--accent);color:white;border:none;font-size:0.8rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;">Save</button>
      <button onclick="cancelEditComment(${commentId},'${original.replace(/'/g,"\'")}',this)" style="padding:5px 14px;border-radius:999px;background:var(--surface2);color:var(--muted);border:1px solid var(--border);font-size:0.8rem;cursor:pointer;font-family:'DM Sans',sans-serif;">Cancel</button>
    </div>`;
  textEl.querySelector("textarea").focus();
}

function cancelEditComment(commentId, original, btn) {
  const textEl = document.getElementById("comment-text-" + commentId);
  textEl.textContent = original;
}

async function saveEditComment(commentId, btn) {
  const textEl = document.getElementById("comment-text-" + commentId);
  const newContent = textEl.querySelector("textarea").value.trim();
  if (!newContent) return;
  btn.textContent = "Saving..."; btn.disabled = true;
  try {
    const res = await fetch(`${API}/api/posts/0/comments/${commentId}`, { method: "PUT", headers: authHeaders(), body: JSON.stringify({ content: newContent }) });
    const data = await res.json();
    if (data.success) { textEl.textContent = newContent; showToast("Comment updated."); }
    else { showToast(data.error || "Failed."); cancelEditComment(commentId, textEl.querySelector("textarea").value, btn); }
  } catch { showToast("Connection error."); }
}

async function deleteComment(postId, commentId, btn) {
  btn.closest(".c-menu-dropdown").style.display = "none";
  const modal = document.getElementById("deleteCommentModal");
  modal.style.display = "flex";
  modal.dataset.postId = postId;
  modal.dataset.commentId = commentId;
}

async function confirmDeleteComment() {
  const modal = document.getElementById("deleteCommentModal");
  const postId = modal.dataset.postId;
  const commentId = modal.dataset.commentId;
  const btn = modal.querySelector(".modal-delete-btn");
  btn.textContent = "Deleting..."; btn.disabled = true;
  try {
    const res = await fetch(`${API}/api/posts/${postId}/comments/${commentId}`, { method: "DELETE", headers: authHeaders() });
    const data = await res.json();
    modal.style.display = "none";
    if (data.success) { showToast("Comment deleted."); await loadComments(postId); }
    else showToast(data.error || "Failed.");
  } catch { showToast("Connection error."); }
  btn.textContent = "Delete"; btn.disabled = false;
}

function closeDeleteCommentModal() {
  document.getElementById("deleteCommentModal").style.display = "none";
}

async function toggleCommentLike(postId, commentId, btn) {
  if (!getUser() && !getBusiness()) {
    showToast("Please log in to like comments.");
    return;
  }
  const liked = btn.dataset.liked === "1";
  const heartSpan = btn.firstElementChild;
  const countSpan = btn.querySelector(".like-count");
  
  const newLiked = !liked;
  btn.dataset.liked = newLiked ? "1" : "0";
  btn.style.color = newLiked ? "var(--danger)" : "var(--muted2)";
  heartSpan.textContent = newLiked ? "❤️" : "🤍";
  
  let currentCount = parseInt(countSpan.textContent.replace(/[^0-9]/g, "")) || 0;
  let newCount = newLiked ? currentCount + 1 : Math.max(0, currentCount - 1);
  countSpan.textContent = `(${newCount})`;

  try {
    const res = await fetch(`${API}/api/posts/${postId}/comments/${commentId}/like`, {
      method: "POST",
      headers: authHeaders()
    });
    const data = await res.json();
    if (data.success) {
      btn.dataset.liked = data.liked ? "1" : "0";
      btn.style.color = data.liked ? "var(--danger)" : "var(--muted2)";
      heartSpan.textContent = data.liked ? "❤️" : "🤍";
      countSpan.textContent = `(${data.like_count || 0})`;
    } else {
      btn.dataset.liked = liked ? "1" : "0";
      btn.style.color = liked ? "var(--danger)" : "var(--muted2)";
      heartSpan.textContent = liked ? "❤️" : "🤍";
      countSpan.textContent = `(${currentCount})`;
      showToast(data.error || "Failed to toggle like.");
    }
  } catch (err) {
    btn.dataset.liked = liked ? "1" : "0";
    btn.style.color = liked ? "var(--danger)" : "var(--muted2)";
    heartSpan.textContent = liked ? "❤️" : "🤍";
    countSpan.textContent = `(${currentCount})`;
    showToast("Connection error.");
  }
}

async function submitComment(postId) {
  const input = document.getElementById(`comment-input-${postId}`);
  const content = input.value.trim();
  if (!content) return;
  try {
    const res = await fetch(`${API}/api/posts/${postId}/comments`, { method: "POST", headers: authHeaders(), body: JSON.stringify({ content }) });
    const data = await res.json();
    if (data.success) { input.value = ""; await loadComments(postId); }
    else showToast(data.error || "Failed.");
  } catch {}
}

async function submitPost() {
  const content = document.getElementById("composeText").value.trim();
  if (!content) return;
  const tagRaw = document.getElementById("tagInput").value.trim();
  const tagged_businesses = tagRaw ? tagRaw.split(",").map(s => s.trim().replace(/^@/, "")).filter(Boolean) : [];
  const btn = document.getElementById("postBtn");
  btn.disabled = true; btn.textContent = "Posting...";
  try {
    const res = await fetch(`${API}/api/posts`, { method: "POST", headers: authHeaders(), body: JSON.stringify({ content, tagged_businesses }) });
    const data = await res.json();
    if (data.success) {
      document.getElementById("composeText").value = "";
      document.getElementById("tagInput").value = "";
      showToast("Post published!");
      await loadFeed(true);
    } else showToast(data.error || "Failed.");
  } catch { showToast("Connection error."); }
  btn.disabled = false; btn.textContent = "Post";
}

function openShare(postId, authorName, preview) {
  if (!getUser()) { window.location.href = "login.html"; return; }
  shareTargetId = postId;
  document.getElementById("sharePreview").innerHTML = `<strong>${escHtml(authorName)}</strong>${escHtml(preview)}${preview.length >= 80 ? "…" : ""}`;
  document.getElementById("shareComment").value = "";
  document.getElementById("shareModal").classList.add("open");
}

function closeShare() {
  document.getElementById("shareModal").classList.remove("open");
  shareTargetId = null;
}

async function confirmShare() {
  if (!shareTargetId) return;
  const content = document.getElementById("shareComment").value.trim();
  try {
    const res = await fetch(`${API}/api/posts/${shareTargetId}/share`, { method: "POST", headers: authHeaders(), body: JSON.stringify({ content }) });
    const data = await res.json();
    closeShare();
    if (data.success) { showToast("Shared successfully!"); await loadFeed(true); }
    else showToast(data.error || "Share failed.");
  } catch {}
}

function setupMentionsAutocomplete() {
  const textarea = document.getElementById("composeText");
  const dropdown = document.getElementById("mentionsDropdown");
  
  let activeTagIndex = -1;
  let activeTagText = "";

  textarea.addEventListener("input", async (e) => {
    const val = textarea.value;
    const cursor = textarea.selectionStart;

    // Find the word currently being typed before the cursor
    const textBeforeCursor = val.substring(0, cursor);
    const words = textBeforeCursor.split(/[\s\n]+/);
    const lastWord = words[words.length - 1];

    if (lastWord && lastWord.startsWith("@")) {
      const query = lastWord.substring(1);
      activeTagIndex = textBeforeCursor.lastIndexOf(lastWord);
      activeTagText = lastWord;

      if (query.length >= 0) {
        try {
          const res = await fetch(`${API}/api/search?q=${encodeURIComponent(query)}`);
          const data = await res.json();
          if (data.success && data.businesses.length > 0) {
            renderMentions(data.businesses);
            dropdown.style.display = "block";
          } else {
            dropdown.style.display = "none";
          }
        } catch (err) {
          console.error(err);
        }
      } else {
        dropdown.style.display = "none";
      }
    } else {
      dropdown.style.display = "none";
    }
  });

  // Close dropdown on click outside
  document.addEventListener("click", (e) => {
    if (!e.target.closest("#composeBox")) {
      dropdown.style.display = "none";
    }
  });

  window.insertMention = function(slug) {
    const val = textarea.value;
    const cursor = textarea.selectionStart;
    
    const before = val.substring(0, activeTagIndex);
    const after = val.substring(cursor);
    
    textarea.value = before + "@" + slug + " " + after;
    dropdown.style.display = "none";
    textarea.focus();
    
    // Set cursor position after the inserted mention
    const newCursorPos = activeTagIndex + slug.length + 2; // +2 for @ and space
    textarea.setSelectionRange(newCursorPos, newCursorPos);
  };

  function renderMentions(businesses) {
    dropdown.innerHTML = businesses.map(b => {
      const initial = b.business_name.charAt(0).toUpperCase();
      const avatarHtml = b.logo_url 
        ? `<img src="${escHtml(b.logo_url)}" style="width:100%;height:100%;object-fit:cover;border-radius:8px;" />`
        : initial;
      
      return `
        <div class="mention-item" onclick="insertMention('${b.slug}')">
          <div class="mention-avatar">${avatarHtml}</div>
          <div style="display:flex;flex-direction:column;min-width:0;text-align:left;">
            <span class="mention-name">${escHtml(b.business_name)}</span>
            <span class="mention-slug">@${escHtml(b.slug)}</span>
          </div>
        </div>
      `;
    }).join("");
  }
}

(async () => { setupUI(); await loadFeed(true); })();
</script>
<div id="deleteCommentModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:500;align-items:center;justify-content:center;backdrop-filter:blur(4px);">
  <div style="background:white;border-radius:16px;padding:28px;width:90%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.2);text-align:center;">
    <h3 style="font-family:'DM Serif Display',serif;font-size:1.3rem;margin-bottom:10px;">Delete Comment?</h3>
    <p style="color:var(--muted);font-size:0.9rem;margin-bottom:24px;">Are you sure you want to delete this comment? This cannot be undone.</p>
    <div style="display:flex;gap:10px;justify-content:center;">
      <button onclick="closeDeleteCommentModal()" style="padding:10px 24px;border-radius:999px;border:1.5px solid var(--border);background:white;color:var(--text);font-size:0.9rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;">No, keep it</button>
      <button class="modal-delete-btn" onclick="confirmDeleteComment()" style="padding:10px 24px;border-radius:999px;border:none;background:var(--danger);color:white;font-size:0.9rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;">Delete</button>
    </div>
  </div>
</div>
</body>
