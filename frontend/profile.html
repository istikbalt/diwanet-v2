<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile · Diwanet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css">
  <style>
    body { min-height: 100vh; background: var(--bg); color: var(--text); }
    
    .wrap { max-width: 900px; margin: 0 auto; padding: 28px 24px; }
    
    /* Header Card */
    .profile-header { background: white; border: 1px solid var(--border); border-radius: 20px; overflow: hidden; margin-bottom: 20px; box-shadow: var(--shadow); }
    .profile-cover { height: 120px; background: linear-gradient(135deg, var(--accent-light), #e8f2fc 50%, #cce3f7); }
    .profile-body { padding: 0 24px 24px; position: relative; }
    .profile-avatar-wrap { margin-top: -34px; margin-bottom: 14px; }
    .profile-avatar { width: 68px; height: 68px; border-radius: 50%; background: linear-gradient(135deg, #60a5fa, #3b82f6); display: grid; place-items: center; font-size: 1.6rem; font-weight: 700; color: white; border: 3px solid white; box-shadow: var(--shadow); }
    .profile-name { font-family: 'DM Serif Display', serif; font-size: 1.6rem; margin-bottom: 4px; color: var(--text); }
    .profile-role { display: inline-block; padding: 3px 12px; border-radius: 999px; font-size: 0.78rem; font-weight: 700; background: var(--accent-light); color: var(--accent-dark); margin-bottom: 10px; }
    .profile-bio { font-size: 0.9rem; color: var(--muted); margin-bottom: 16px; line-height: 1.5; }
    
    /* Stats */
    .profile-stats { display: flex; gap: 28px; border-top: 1px solid var(--border); padding-top: 16px; }
    .stat { text-align: center; }
    .stat-val { font-size: 1.2rem; font-weight: 800; color: var(--accent); }
    .stat-lbl { font-size: 0.76rem; color: var(--muted2); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
    
    /* Tabs */
    .tabs { display: flex; gap: 4px; margin-bottom: 20px; background: white; border: 1px solid var(--border); border-radius: 14px; padding: 5px; box-shadow: var(--shadow); }
    .tab { flex: 1; padding: 9px; border-radius: 10px; text-align: center; font-size: 0.88rem; font-weight: 600; cursor: pointer; color: var(--muted); border: none; background: none; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
    .tab.active { background: var(--accent); color: white; font-weight: 700; }
    .tab:hover:not(.active) { background: var(--surface2); }
    
    /* Content Cards */
    .card { background: white; border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 12px; box-shadow: var(--shadow); transition: all 0.2s; }
    .card:hover { box-shadow: var(--shadow-lg); border-color: rgba(15, 76, 129, 0.2); }
    .card-label { font-size: 0.76rem; color: var(--muted2); margin-bottom: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .card-label a { color: var(--accent); text-decoration: none; font-weight: 700; }
    .card-label a:hover { text-decoration: underline; }
    .card-content { font-size: 0.91rem; line-height: 1.6; color: var(--text); }
    .card-meta { font-size: 0.76rem; color: var(--muted2); margin-top: 8px; }
    .post-actions { display: flex; align-items: center; gap: 4px; border-top: 1px solid var(--border); padding-top: 12px; margin-top: 12px; }
    .action-btn { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 999px; border: none; background: none; color: var(--muted); font-size: 0.8rem; cursor: pointer; font-family: inherit; transition: all 0.15s; font-weight: 600; }
    .action-btn:hover { background: var(--surface2); color: var(--text); }
    .action-sep { width: 1px; height: 14px; background: var(--border); margin: 0 4px; }
    
    .shared-preview { margin-top: 10px; padding: 12px; border-radius: 10px; background: var(--surface2); border: 1px solid var(--border); border-left: 3px solid var(--accent); }
    .shared-preview .from { font-size: 0.76rem; color: var(--muted); margin-bottom: 5px; }
    .shared-preview .from a { color: var(--accent); text-decoration: none; font-weight: 600; }
    .shared-preview .text { font-size: 0.87rem; line-height: 1.5; color: var(--text); }
    
    /* Following Grid */
    .following-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
    .follow-card { background: white; border: 1.5px solid var(--border); border-radius: 14px; padding: 16px; text-decoration: none; transition: all 0.2s; display: block; box-shadow: var(--shadow); }
    .follow-card:hover { border-color: var(--accent); box-shadow: var(--shadow-lg); transform: translateY(-2px); }
    .follow-card-avatar { width: 42px; height: 42px; border-radius: 12px; background: linear-gradient(135deg, var(--accent), var(--accent-dark)); display: grid; place-items: center; font-weight: 700; color: white; margin-bottom: 10px; }
    .follow-card-name { font-size: 0.9rem; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .follow-card-cat { font-size: 0.76rem; color: var(--muted2); }
    
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    /* Compose Box */
    #composeText:focus { border-color: var(--accent) !important; background: white !important; }

    /* Mentions Dropdown */
    .mention-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      cursor: pointer;
      transition: background 0.15s;
      border-bottom: 1px solid var(--border);
    }
    .mention-item:last-child {
      border-bottom: none;
    }
    .mention-item:hover {
      background: var(--accent-light);
    }
    .mention-avatar {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      display: grid;
      place-items: center;
      font-weight: 700;
      color: white;
      font-size: 0.8rem;
      flex-shrink: 0;
      overflow: hidden;
    }
    .mention-name {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
    }
    .mention-slug {
      font-size: 0.76rem;
      color: var(--muted2);
      margin-top: 1px;
    }

    /* Toast and Empty State */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: white;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 24px;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 600;
      box-shadow: var(--shadow-lg);
      z-index: 999;
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      pointer-events: none;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 16px;
      color: var(--muted);
    }
    .empty-state h3 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.3rem;
      margin-bottom: 8px;
      color: var(--text);
    }
    .empty-state p {
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <a href="feed.html" class="brand">
      <div class="brand-mark">D</div>
      <span class="brand-name">Diwanet</span>
    </a>
    <nav class="topbar-nav" id="topbarNav">
      <a href="feed.html">Feed</a>
      <a href="categories.html">Explore</a>
    </nav>
    <div class="topbar-actions" id="authArea"></div>
  </div>
</header>

<div class="wrap">
  <div id="profileHeader" class="profile-header">
    <div class="empty-state"><h3>Loading profile...</h3></div>
  </div>

  <div class="compose-box" id="composeBox" style="position:relative;display:none;background:white;border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:20px;box-shadow:var(--shadow);">
    <div style="display:flex;gap:12px;">
      <div class="avatar" id="composeAvatar" style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#60a5fa,#3b82f6);display:grid;place-items:center;font-weight:700;color:white;font-size:1.1rem;flex-shrink:0;">?</div>
      <div style="flex:1;position:relative;">
        <textarea id="composeText" placeholder="What are you doing today? Tag a business to post (e.g. @business-slug)" style="width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;padding:10px 14px;font-size:0.9rem;color:var(--text);font-family:inherit;resize:none;min-height:70px;outline:none;transition:border-color 0.2s;"></textarea>
        
        <!-- Image Preview Container -->
        <div id="imagePreviewContainer" style="display:none;position:relative;margin-top:10px;width:120px;height:90px;border-radius:8px;overflow:hidden;border:1px solid var(--border);">
          <img id="postImagePreview" src="" style="width:100%;height:100%;object-fit:cover;" />
          <button onclick="removePostImage()" style="position:absolute;top:4px;right:4px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,0.6);color:white;border:none;font-size:0.75rem;cursor:pointer;display:grid;place-items:center;padding:0;">✕</button>
        </div>

        <!-- Autocomplete Mentions List -->
        <div id="mentionsDropdown" style="display:none;position:absolute;top:100%;left:0;right:0;background:white;border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow-lg);z-index:10;max-height:200px;overflow-y:auto;margin-top:4px;"></div>
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);">
      <button class="btn btn-ghost btn-sm" onclick="document.getElementById('postImageInput').click()" style="padding:6px 12px;font-size:0.8rem;border:1px solid var(--border);background:var(--surface2);">
        📷 Add Picture
      </button>
      <input type="file" id="postImageInput" accept="image/*" style="display:none;" onchange="handlePostImageUpload(this)" />
      <button class="btn btn-primary btn-sm" id="postBtn" onclick="submitPost()" style="padding:7px 18px;font-size:0.84rem;">Post</button>
    </div>
  </div>
  
  <div class="tabs" id="tabsBar" style="display:none;">
    <button class="tab active" onclick="switchTab('shares')">Shares</button>
    <button class="tab" onclick="switchTab('comments')">Comments</button>
    <button class="tab" onclick="switchTab('following')">Following</button>
  </div>
  
  <div id="tab-shares" class="tab-content active">
    <div class="empty-state"><h3>Loading...</h3></div>
  </div>
  <div id="tab-comments" class="tab-content">
    <div class="empty-state"><h3>Loading...</h3></div>
  </div>
  <div id="tab-following" class="tab-content">
    <div class="empty-state"><h3>Loading...</h3></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="assets/js/auth.js"></script>
<script>
  let profileUserData = null;
  let postImageUrl = null;

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg; t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2800);
  }

  function getUserIdFromUrl() {
    return new URLSearchParams(window.location.search).get("id");
  }

  function switchTab(tab) {
    document.querySelectorAll(".tab").forEach((t, i) => {
      const tabs = ["shares", "comments", "following"];
      t.classList.toggle("active", tabs[i] === tab);
    });
    document.querySelectorAll(".tab-content").forEach(el => el.classList.remove("active"));
    document.getElementById(`tab-${tab}`).classList.add("active");
  }

  function setupNav() {
    renderTopbarAuth("authArea");
  }

  async function loadProfile() {
    const userId = getUserIdFromUrl();
    if (!userId) {
      document.getElementById("profileHeader").innerHTML = '<div class="empty-state"><h3>No user specified.</h3></div>';
      return;
    }
    const token = getToken();
    const headers = token ? { "Authorization": "Bearer " + token } : {};
    try {
      const res = await fetch(`${API}/api/profile/${userId}`, { headers });
      const data = await res.json();
      if (!data.success) {
        document.getElementById("profileHeader").innerHTML = '<div class="empty-state"><h3>User not found.</h3></div>';
        return;
      }
      
      const u = data.user;
      profileUserData = u;
      const loggedInUser = getUser();
      const isMyProfile = loggedInUser && loggedInUser.id === u.id;
      
      const editBtnHtml = isMyProfile 
        ? `<a href="edit-profile.html" class="btn btn-primary btn-sm" style="position:absolute;top:20px;right:24px;display:inline-flex;align-items:center;gap:6px;"><span style="font-size:0.95rem;">✏️</span> Edit Profile</a>`
        : "";

      const initial = (u.first_name || "?").charAt(0).toUpperCase();
      const fullName = `${u.first_name} ${u.last_name}`;
      const joinDate = new Date(u.created_at).toLocaleDateString("en-US", { month: "long", year: "numeric" });
      
      const avatarHtml = u.avatar_url 
        ? `<img src="${escHtml(u.avatar_url)}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" />`
        : escHtml(initial);
      
      const coverStyle = u.cover_url 
        ? `style="background-image:url(${escHtml(u.cover_url)});background-size:cover;background-position:center;"`
        : "";

      document.getElementById("profileHeader").innerHTML = `
        <div class="profile-cover" ${coverStyle}></div>
        <div class="profile-body">
          ${editBtnHtml}
          <div class="profile-avatar-wrap">
            <div class="profile-avatar">${avatarHtml}</div>
          </div>
          <div class="profile-name">${escHtml(fullName)}</div>
          <div class="profile-role">${u.role === 'business_owner' ? 'Business Owner' : 'Individual Member'}</div>
          ${u.bio ? `<div class="profile-bio">${escHtml(u.bio)}</div>` : ""}
          <div class="profile-stats">
            <div class="stat">
              <div class="stat-val">${data.shares.length}</div>
              <div class="stat-lbl">Shares</div>
            </div>
            <div class="stat">
              <div class="stat-val">${data.comments.length}</div>
              <div class="stat-lbl">Comments</div>
            </div>
            <div class="stat">
              <div class="stat-val">${data.following.length}</div>
              <div class="stat-lbl">Following</div>
            </div>
            <div class="stat">
              <div class="stat-val" style="color:var(--muted2);font-size:0.85rem;font-weight:700;padding-top:3px;">${joinDate}</div>
              <div class="stat-lbl">Joined</div>
            </div>
          </div>
        </div>
      `;
      
      if (isMyProfile) {
        document.getElementById("composeBox").style.display = "block";
        document.getElementById("composeAvatar").textContent = u.first_name.charAt(0).toUpperCase();
        setupMentionsAutocomplete();
      }

      document.getElementById("tabsBar").style.display = "flex";
      
      // Shares/Posts Tab
      if (data.shares.length === 0) {
        document.getElementById("tab-shares").innerHTML = `
          <div class="empty-state">
            <h3>No shares yet</h3>
            <p>Shares and tagged business posts will appear here.</p>
          </div>`;
      } else {
        document.getElementById("tab-shares").innerHTML = data.shares.map(s => {
          if (s.post_type === "post") {
            let mediaHtml = "";
            let images = [];
            try {
              images = s.images ? JSON.parse(s.images) : (s.image_url ? [s.image_url] : []);
            } catch (err) {
              if (s.image_url) images = [s.image_url];
            }
            if (images && images.length > 0 && images[0]) {
              mediaHtml = `<img src="${escHtml(images[0])}" style="width:100%;max-height:280px;object-fit:cover;border-radius:8px;margin-top:10px;display:block;" />`;
            }

            return `
              <div class="card" id="post-${s.id}">
                <div class="card-label">
                  <span>📝 Posted about <a href="business.html?slug=${s.tagged_business_slug}">${escHtml(s.tagged_business_name)}</a></span>
                </div>
                <div class="card-content" style="margin-top:8px;font-size:0.95rem;line-height:1.6;white-space:pre-wrap;">${escHtml(s.content)}</div>
                ${mediaHtml}
                <div class="card-meta">${timeAgo(s.created_at)}</div>
                ${isMyProfile ? `
                  <div class="post-actions">
                    <button class="action-btn" onclick="editPost(${s.id}, this)">✏️ Edit</button>
                    <div class="action-sep"></div>
                    <button class="action-btn" style="color:var(--danger);" onclick="deletePost(${s.id}, this)">🗑️ Delete</button>
                  </div>
                ` : ""}
              </div>
            `;
          }
          
          let mediaHtml = "";
          let images = [];
          try {
            images = s.original_images ? JSON.parse(s.original_images) : (s.original_image_url ? [s.original_image_url] : []);
          } catch (err) {
            if (s.original_image_url) images = [s.original_image_url];
          }
          if (images && images.length > 0 && images[0]) {
            mediaHtml = `<img src="${escHtml(images[0])}" style="width:100%;max-height:280px;object-fit:cover;border-radius:8px;margin-top:10px;display:block;" />`;
          }
          return `
            <div class="card" id="post-${s.id}">
              <div class="card-label">
                <span>🔁 Shared from <a href="business.html?slug=${s.original_business_slug}">${escHtml(s.original_business_name)}</a></span>
              </div>
              ${s.content ? `<div class="card-content" style="margin-bottom:10px;white-space:pre-wrap;">${escHtml(s.content)}</div>` : ""}
              <div class="shared-preview">
                <div class="from">Original by <a href="business.html?slug=${s.original_business_slug}">${escHtml(s.original_business_name)}</a></div>
                <div class="text" style="white-space:pre-wrap;">${escHtml((s.original_content || "").substring(0, 180))}${(s.original_content || "").length > 180 ? "…" : ""}</div>
                ${mediaHtml}
              </div>
              <div class="card-meta">${timeAgo(s.created_at)}</div>
              ${isMyProfile ? `
                <div class="post-actions">
                  <button class="action-btn" onclick="editPost(${s.id}, this)">✏️ Edit</button>
                  <div class="action-sep"></div>
                  <button class="action-btn" style="color:var(--danger);" onclick="deletePost(${s.id}, this)">🗑️ Delete</button>
                </div>
              ` : ""}
            </div>
          `;
        }).join("");
      }
      
      // Comments Tab
      if (data.comments.length === 0) {
        document.getElementById("tab-comments").innerHTML = `
          <div class="empty-state">
            <h3>No comments yet</h3>
            <p>Comments on business posts will appear here.</p>
          </div>`;
      } else {
        document.getElementById("tab-comments").innerHTML = data.comments.map(c => `
          <div class="card">
            <div class="card-label">💬 Commented on <a href="business.html?slug=${c.business_slug}">${escHtml(c.business_name)}</a></div>
            <div class="card-content">${escHtml(c.content)}</div>
            <div class="card-meta">${timeAgo(c.created_at)}</div>
          </div>`).join("");
      }
      
      // Following Tab
      if (data.following.length === 0) {
        document.getElementById("tab-following").innerHTML = `
          <div class="empty-state">
            <h3>Not following anyone</h3>
            <p><a href="categories.html" style="color:var(--accent);text-decoration:none;font-weight:600;">Explore businesses</a> to follow.</p>
          </div>`;
      } else {
        document.getElementById("tab-following").innerHTML = `
          <div class="following-grid">
            ${data.following.map(b => `
              <a class="follow-card" href="business.html?slug=${b.slug}">
                <div class="follow-card-avatar">${b.logo_url ? `<img src="${escHtml(b.logo_url)}" style="width:100%;height:100%;object-fit:cover;border-radius:12px;" />` : b.business_name.charAt(0)}</div>
                <div class="follow-card-name">${escHtml(b.business_name)}</div>
                <div class="follow-card-cat">${escHtml(b.category_name || "")}</div>
              </a>`).join("")}
          </div>`;
      }
    } catch (e) {
      document.getElementById("profileHeader").innerHTML = '<div class="empty-state"><h3>Connection error.</h3></div>';
    }
  }

  function setupMentionsAutocomplete() {
    const textarea = document.getElementById("composeText");
    const dropdown = document.getElementById("mentionsDropdown");
    
    let activeTagIndex = -1;
    let activeTagText = "";

    textarea.addEventListener("input", async (e) => {
      const val = textarea.value;
      const cursor = textarea.selectionStart;

      // Find the word currently being typed before the cursor
      const textBeforeCursor = val.substring(0, cursor);
      const words = textBeforeCursor.split(/[\s\n]+/);
      const lastWord = words[words.length - 1];

      if (lastWord && lastWord.startsWith("@")) {
        const query = lastWord.substring(1);
        activeTagIndex = textBeforeCursor.lastIndexOf(lastWord);
        activeTagText = lastWord;

        if (query.length >= 0) {
          try {
            const res = await fetch(`${API}/api/search?q=${encodeURIComponent(query)}`);
            const data = await res.json();
            if (data.success && data.businesses.length > 0) {
              renderMentions(data.businesses);
              dropdown.style.display = "block";
            } else {
              dropdown.style.display = "none";
            }
          } catch (err) {
            console.error(err);
          }
        } else {
          dropdown.style.display = "none";
        }
      } else {
        dropdown.style.display = "none";
      }
    });

    // Close dropdown on click outside
    document.addEventListener("click", (e) => {
      if (!e.target.closest("#composeBox")) {
        dropdown.style.display = "none";
      }
    });

    window.insertMention = function(slug) {
      const val = textarea.value;
      const cursor = textarea.selectionStart;
      
      const before = val.substring(0, activeTagIndex);
      const after = val.substring(cursor);
      
      textarea.value = before + "@" + slug + " " + after;
      dropdown.style.display = "none";
      textarea.focus();
      
      // Set cursor position after the inserted mention
      const newCursorPos = activeTagIndex + slug.length + 2; // +2 for @ and space
      textarea.setSelectionRange(newCursorPos, newCursorPos);
    };

    function renderMentions(businesses) {
      dropdown.innerHTML = businesses.map(b => {
        const initial = b.business_name.charAt(0).toUpperCase();
        const avatarHtml = b.logo_url 
          ? `<img src="${escHtml(b.logo_url)}" style="width:100%;height:100%;object-fit:cover;border-radius:8px;" />`
          : initial;
        
        return `
          <div class="mention-item" onclick="insertMention('${b.slug}')">
            <div class="mention-avatar">${avatarHtml}</div>
            <div style="display:flex;flex-direction:column;min-width:0;text-align:left;">
              <span class="mention-name">${escHtml(b.business_name)}</span>
              <span class="mention-slug">@${escHtml(b.slug)}</span>
            </div>
          </div>
        `;
      }).join("");
    }
  }

  async function handlePostImageUpload(input) {
    const file = input.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) { showToast("File too large. Max 5MB."); return; }

    const btn = document.getElementById("postBtn");
    btn.disabled = true;
    btn.textContent = "Uploading...";

    const formData = new FormData();
    formData.append("file", file);

    try {
      const res = await fetch(`${API}/api/upload`, { method: "POST", body: formData });
      const data = await res.json();
      if (data.url) {
        postImageUrl = data.url;
        document.getElementById("postImagePreview").src = data.url;
        document.getElementById("imagePreviewContainer").style.display = "block";
        showToast("Image uploaded successfully!");
      } else {
        showToast("Upload failed.");
      }
    } catch (err) {
      showToast("Upload error.");
    } finally {
      btn.disabled = false;
      btn.textContent = "Post";
      input.value = ""; // Clear file input
    }
  }

  function removePostImage() {
    postImageUrl = null;
    document.getElementById("imagePreviewContainer").style.display = "none";
    document.getElementById("postImagePreview").src = "";
  }

  async function submitPost() {
    const txt = document.getElementById("composeText").value.trim();
    if (!txt) return;

    const btn = document.getElementById("postBtn");
    btn.disabled = true;
    btn.textContent = "Posting...";

    const payload = { content: txt };
    if (postImageUrl) {
      payload.image_url = postImageUrl;
      payload.images = [postImageUrl];
    }

    try {
      const res = await fetch(`${API}/api/posts`, {
        method: "POST",
        headers: authHeaders(),
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (data.success) {
        document.getElementById("composeText").value = "";
        removePostImage();
        showToast("Post published successfully!");
        setTimeout(() => { window.location.reload(); }, 1000);
      } else {
        showToast(data.error || "Failed to publish post.");
      }
    } catch (err) {
      showToast("Connection error.");
    } finally {
      btn.disabled = false;
      btn.textContent = "Post";
    }
  }

  function deletePost(postId, btn) {
    const postEl = document.getElementById(`post-${postId}`);
    const existing = postEl.querySelector(".delete-confirm");
    if (existing) { existing.remove(); return; }
    const confirmBox = document.createElement("div");
    confirmBox.className = "delete-confirm";
    confirmBox.style.cssText = "margin-top:12px;padding:12px;background:#fee2e2;border:1px solid #fecaca;border-radius:10px;display:flex;align-items:center;justify-content:space-between;width:100%;box-sizing:border-box;";
    confirmBox.innerHTML = `
      <span style="font-size:0.85rem;color:var(--danger);font-weight:600;">Delete this post?</span>
      <div style="display:flex;gap:8px;">
        <button onclick="confirmDeletePost(${postId}, this)" style="padding:6px 14px;border-radius:999px;background:var(--danger);color:white;border:none;cursor:pointer;font-size:0.8rem;font-weight:700;font-family:inherit;">Delete</button>
        <button onclick="this.closest('.delete-confirm').remove()" style="padding:6px 14px;border-radius:999px;background:white;color:#333;border:1px solid #ddd;cursor:pointer;font-size:0.8rem;font-family:inherit;font-weight:500;">Cancel</button>
      </div>`;
    
    const actionsEl = postEl.querySelector(".post-actions");
    if (actionsEl) {
      actionsEl.after(confirmBox);
    } else {
      postEl.appendChild(confirmBox);
    }
  }

  async function confirmDeletePost(postId, btn) {
    btn.disabled = true; btn.textContent = "Deleting...";
    try {
      const res = await fetch(`${API}/api/posts/${postId}`, {
        method: "DELETE",
        headers: authHeaders()
      });
      const data = await res.json();
      if (data.success) {
        showToast("Post deleted successfully.");
        const card = document.getElementById(`post-${postId}`);
        card.style.opacity = "0";
        card.style.transform = "scale(0.95)";
        card.style.transition = "all 0.3s ease";
        setTimeout(() => { card.remove(); }, 300);
      } else {
        showToast(data.error || "Failed to delete post.");
        btn.disabled = false; btn.textContent = "Delete";
      }
    } catch (err) {
      showToast("Connection error.");
      btn.disabled = false; btn.textContent = "Delete";
    }
  }

  function editPost(postId, btn) {
    const postEl = document.getElementById(`post-${postId}`);
    let contentEl = postEl.querySelector(".card-content");
    
    // If it's a share card, it might not have an existing card-content if commentary was empty
    if (!contentEl) {
      // Create a temporary card-content for the editor
      contentEl = document.createElement("div");
      contentEl.className = "card-content";
      contentEl.style.cssText = "margin-bottom:10px;white-space:pre-wrap;display:none;";
      const previewEl = postEl.querySelector(".shared-preview");
      if (previewEl) {
        previewEl.before(contentEl);
      } else {
        postEl.appendChild(contentEl);
      }
    }

    const existingEditor = postEl.querySelector(".inline-editor");
    if (existingEditor) { existingEditor.remove(); contentEl.style.display = "block"; return; }
    
    contentEl.style.display = "none";
    const currentContent = contentEl.textContent.trim();
    const editor = document.createElement("div");
    editor.className = "inline-editor"; editor.style.cssText = "margin-top:10px;margin-bottom:10px;width:100%;box-sizing:border-box;";
    editor.innerHTML = `
      <textarea style="width:100%;border:1.5px solid var(--accent);border-radius:10px;padding:10px;font-size:0.92rem;font-family:inherit;resize:vertical;min-height:80px;box-sizing:border-box;background:white;color:var(--text);">${currentContent}</textarea>
      <div style="display:flex;gap:8px;margin-top:8px;">
        <button onclick="saveEditPost(${postId},this)" style="padding:7px 16px;border-radius:999px;background:var(--accent);color:white;border:none;cursor:pointer;font-size:0.82rem;font-weight:700;font-family:inherit;">Save</button>
        <button onclick="cancelEditPost(${postId},this)" style="padding:7px 16px;border-radius:999px;background:var(--surface2);color:var(--text);border:1px solid var(--border);cursor:pointer;font-size:0.82rem;font-family:inherit;font-weight:500;">Cancel</button>
      </div>`;
    contentEl.after(editor); 
    editor.querySelector("textarea").focus();
  }

  function cancelEditPost(postId, btn) {
    const card = btn.closest(".card");
    const contentEl = card.querySelector(".card-content");
    if (contentEl.textContent.trim() === "") {
      contentEl.remove();
    } else {
      contentEl.style.display = "block";
    }
    btn.closest(".inline-editor").remove();
  }

  async function saveEditPost(postId, btn) {
    const editor = btn.closest(".inline-editor");
    const newContent = editor.querySelector("textarea").value.trim();
    
    // Check if the post type is a normal post (requires @tag)
    const card = btn.closest(".card");
    const isShare = card.querySelector(".shared-preview") !== null;

    if (!isShare) {
      if (!newContent) {
        showToast("Content cannot be empty.");
        return;
      }
      // Validate that they didn't delete the @slug tag
      const matches = newContent.match(/@([a-zA-Z0-9-_]+)/g);
      if (!matches) {
        showToast("Your post must tag a business using @business-slug.");
        return;
      }
    }

    btn.disabled = true; btn.textContent = "Saving...";
    try {
      const res = await fetch(`${API}/api/posts/${postId}`, {
        method: "PUT",
        headers: authHeaders(),
        body: JSON.stringify({ content: newContent })
      });
      const data = await res.json();
      if (data.success) {
        let contentEl = card.querySelector(".card-content");
        if (!contentEl) {
          contentEl = document.createElement("div");
          contentEl.className = "card-content";
          contentEl.style.cssText = "margin-bottom:10px;white-space:pre-wrap;";
          card.querySelector(".shared-preview").before(contentEl);
        }
        contentEl.textContent = newContent;
        if (newContent === "" && isShare) {
          contentEl.remove();
        } else {
          contentEl.style.display = "block";
        }
        editor.remove();
        showToast("Post updated successfully.");
      } else {
        showToast(data.error || "Failed to update post.");
        btn.disabled = false; btn.textContent = "Save";
      }
    } catch (err) {
      showToast("Connection error.");
      btn.disabled = false; btn.textContent = "Save";
    }
  }

  setupNav();
  loadProfile();
</script>
</body>
</html>
