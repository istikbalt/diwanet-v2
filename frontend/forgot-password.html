<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password · Diwanet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css">
  <style>
    body { display: grid; place-items: center; min-height: 100vh; padding: 24px; }
    .auth-card {
      width: 100%; max-width: 420px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 24px; padding: 40px; box-shadow: var(--shadow-lg);
    }
    .auth-brand { margin-bottom: 32px; }
    h1 { font-family: 'DM Serif Display', serif; font-size: 1.9rem; margin-bottom: 6px; }
    .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 28px; }
    .footer-links { text-align: center; margin-top: 20px; font-size: 0.88rem; color: var(--muted); }
    .footer-links a { color: var(--accent); font-weight: 600; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-brand">
      <a href="index.html" class="brand">
        <div class="brand-mark">D</div>
        <span class="brand-name">Diwanet</span>
      </a>
    </div>

    <h1>Reset Password</h1>
    <p class="sub">Enter your email to receive a password reset link.</p>

    <div class="field">
      <label>Email address</label>
      <input id="email" type="email" placeholder="you@example.com" />
    </div>

    <button class="btn btn-primary btn-full btn-lg" id="resetBtn" onclick="sendReset()" style="margin-top:16px;">Send reset link</button>

    <div class="msg" id="msg" style="margin-top:14px;"></div>

    <div class="divider"></div>

    <div class="footer-links"><a href="login.html">← Back to sign in</a></div>
  </div>

  <script src="assets/js/auth.js"></script>
  <script>
    if (getToken()) window.location.href = "feed.html";

    async function sendReset() {
      const email = document.getElementById("email").value.trim();
      const btn = document.getElementById("resetBtn");
      const msg = document.getElementById("msg");

      if (!email) {
        showMsg("Please enter your email address.", "error");
        return;
      }

      btn.disabled = true; btn.textContent = "Sending link...";
      msg.className = "msg";

      try {
        const res = await fetch(`${API}/api/auth/forgot-password`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email })
        });
        
        // Zaten başarılı dönse de dönmese de güvenlik için aynı mesajı gösterebiliriz ya da doğrudan basarız
        showMsg("If this email exists, a reset link has been sent. Check your inbox.", "success");
      } catch (e) {
        showMsg("Connection failed: " + e.message, "error");
      } finally {
        btn.disabled = false; btn.textContent = "Send reset link";
      }
    }

    function showMsg(text, type) {
      const msg = document.getElementById("msg");
      msg.className = "msg " + type; msg.textContent = text;
    }

    document.addEventListener("keydown", e => { if (e.key === "Enter") sendReset(); });
  </script>
</body>
</html>
