<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — Diwanet</title>
  <link rel="stylesheet" href="assets/css/main.css" />
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a href="index.html" class="brand">
        <div class="brand-mark">D</div>
        <span>Diwanet</span>
      </a>
    </div>
  </header>

  <div style="max-width:420px;margin:60px auto;padding:0 16px;">
    <div class="card" style="padding:32px;">
      <h2 style="margin:0 0 8px;font-size:1.4rem;">Forgot your password?</h2>
      <p style="margin:0 0 24px;color:#718096;font-size:0.9rem;">Enter your email address and we'll send you a reset link.</p>

      <div class="field">
        <label>Email address</label>
        <input id="email" type="email" placeholder="you@example.com" />
      </div>

      <button class="btn btn-primary btn-full btn-lg" onclick="sendReset()" style="margin-top:16px;">Send reset link</button>

      <div id="msg" style="margin-top:14px;font-size:0.88rem;text-align:center;display:none;"></div>

      <div style="text-align:center;margin-top:16px;">
        <a href="login.html" style="font-size:0.88rem;color:#3b82f6;">Back to sign in</a>
      </div>
    </div>
  </div>

  <script>
    const API = "https://diwanet.com";

    async function sendReset() {
      const email = document.getElementById("email").value.trim();
      const msg = document.getElementById("msg");

      if (!email) {
        msg.style.display = "block";
        msg.style.color = "#e53e3e";
        msg.textContent = "Please enter your email address.";
        return;
      }

      try {
        const res = await fetch(`${API}/api/auth/forgot-password`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        msg.style.display = "block";
        msg.style.color = "#38a169";
        msg.textContent = "If this email exists, a reset link has been sent. Check your inbox.";
      } catch(e) {
        msg.style.display = "block";
        msg.style.color = "#e53e3e";
        msg.textContent = "Connection error. Please try again.";
      }
    }
  </script>
</body>
</html>
