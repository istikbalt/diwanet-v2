<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In · Diwanet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css">
  <style>
    body { display: grid; place-items: center; min-height: 100vh; padding: 24px; }
    .auth-card {
      width: 100%; max-width: 420px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 24px; padding: 40px; box-shadow: var(--shadow-lg);
    }
    .auth-brand { margin-bottom: 32px; }
    h1 { font-family: 'DM Serif Display', serif; font-size: 1.9rem; margin-bottom: 6px; }
    .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 28px; }
    .footer-links { text-align: center; margin-top: 20px; font-size: 0.88rem; color: var(--muted); }
    .footer-links a { color: var(--accent); font-weight: 600; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-brand">
      <a href="index.html" class="brand">
        <div class="brand-mark">D</div>
        <span class="brand-name">Diwanet</span>
      </a>
    </div>

    <h1>Welcome back</h1>
    <p class="sub">Sign in with your email and password.</p>

    <div class="field">
      <label>Email address</label>
      <input id="email" type="email" placeholder="you@example.com" />
    </div>
    <div class="field">
      <label>Password</label>
      <input id="password" type="password" placeholder="••••••••" />
    </div>

    <button class="btn btn-primary btn-full btn-lg" id="loginBtn" onclick="doLogin()" style="margin-top:8px;">Sign in</button>
    <p style="font-size:0.75rem;color:var(--muted2);text-align:center;margin-top:10px;line-height:1.4;">
      By signing in, you agree to our 
      <a href="terms.html" style="color:var(--accent);text-decoration:underline;">Terms of Service</a> and 
      <a href="privacy-policy.html" style="color:var(--accent);text-decoration:underline;">Privacy Policy</a>.
    </p>
    <div style="text-align:center;margin-top:12px;">
      <a href="forgot-password.html" style="font-size:0.88rem;color:#3b82f6;">Forgot your password?</a>
    </div>
    <div class="msg" id="msg" style="margin-top:14px;"></div>

    <div class="divider"></div>

    <div class="footer-links">Don't have an account? <a href="signup.html">Sign up</a></div>
    <div class="footer-links" style="margin-top:8px;"><a href="index.html" style="color:var(--muted);font-weight:400;">← Back to home</a></div>
  </div>

  <script src="assets/js/auth.js"></script>
  <script>
    // Zaten giriş yaptıysa yönlendir
    if (getToken()) window.location.href = "feed.html";

    async function doLogin() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const btn = document.getElementById("loginBtn");
      const msg = document.getElementById("msg");

      if (!email || !password) { showMsg("Please fill in all fields.", "error"); return; }

      btn.disabled = true; btn.textContent = "Signing in...";
      msg.className = "msg";

      try {
        const res = await fetch(`${API}/api/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (!data.success) {
          showMsg(data.error || "Login failed.", "error");
        } else {
          setAuth(data.token, data.user, data.business);
          showMsg("Redirecting...", "success");
          setTimeout(() => { window.location.href = "feed.html"; }, 600);
        }
      } catch (e) {
        showMsg("Connection failed: " + e.message, "error");
      } finally {
        btn.disabled = false; btn.textContent = "Sign in";
      }
    }

    function showMsg(text, type) {
      const msg = document.getElementById("msg");
      msg.className = "msg " + type; msg.textContent = text;
    }

    document.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
  </script>
</body>
</html>
