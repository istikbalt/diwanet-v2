<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Categories · Diwanet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css">
  <style>
    .wrap { max-width: 1100px; margin: 0 auto; padding: 48px 24px; }
    .page-title { font-family: 'DM Serif Display', serif; font-size: 2.4rem; margin-bottom: 8px; }
    .page-sub { color: var(--muted); margin-bottom: 40px; }
    .main-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
    .cat-section { background: white; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
    .cat-header { padding: 20px 24px; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.2s; text-decoration: none; color: var(--text); }
    .cat-header:hover { background: var(--accent-light); }
    .cat-icon { width: 44px; height: 44px; border-radius: 12px; background: var(--accent-light); display: grid; place-items: center; font-size: 1.3rem; flex-shrink: 0; }
    .cat-name { font-weight: 700; font-size: 1rem; }
    .cat-count { font-size: 0.78rem; color: var(--muted2); margin-top: 2px; }
    .sub-list { padding: 8px 0; }
    .sub-item { display: block; padding: 10px 24px; font-size: 0.88rem; color: var(--muted); text-decoration: none; transition: all 0.2s; }
    .sub-item:hover { background: var(--accent-light); color: var(--accent); padding-left: 30px; }
    @media (max-width: 900px) { .main-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) { .main-grid { grid-template-columns: 1fr; } .page-title { font-size: 1.8rem; } }
  </style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <a href="index.html" class="brand">
      <div class="brand-mark">D</div>
      <span class="brand-name">Diwanet</span>
    </a>
    <nav class="topbar-nav">
      <a href="feed.html">Feed</a>
      <a href="categories.html" class="active">Categories</a>
    </nav>
    <div class="topbar-actions" id="authArea"></div>
  </div>
</header>

<div class="wrap">
  <h1 class="page-title">All Categories</h1>
  <p class="page-sub">Browse businesses by industry. Click any subcategory to explore businesses in that field.</p>
  <div class="main-grid" id="catGrid"><div class="loading">Loading categories...</div></div>
</div>

<script src="assets/js/auth.js"></script>
<script>
renderTopbarAuth("authArea");

const CAT_ICONS = {
  'food-dining': '🍽️', 'technology-it': '💻', 'health-wellness': '🏥',
  'home-living': '🏠', 'education': '📚', 'professional-services': '💼',
  'retail': '🛍️', 'automotive': '🚗', 'beauty-personal-care': '💇',
  'travel-hospitality': '✈️', 'arts-entertainment': '🎭', 'government-nonprofit': '⚖️'
};

async function load() {
  try {
    const [catRes, subRes] = await Promise.all([
      fetch(`${API}/api/categories`),
      fetch(`${API}/api/categories/subcategories/all`)
    ]);
    const catData = await catRes.json();

    let subsByCategory = {};
    try {
      const subData = await subRes.json();
      if (subData.success) {
        subData.subcategories.forEach(s => {
          if (!subsByCategory[s.category_id]) subsByCategory[s.category_id] = [];
          subsByCategory[s.category_id].push(s);
        });
      }
    } catch {}

    if (!catData.success) { document.getElementById("catGrid").innerHTML = '<div class="loading">Could not load categories.</div>'; return; }

    document.getElementById("catGrid").innerHTML = catData.categories.map(c => `
      <div class="cat-section">
        <a href="feed.html?category=${c.slug}" class="cat-header">
          <div class="cat-icon">${CAT_ICONS[c.slug] || "🏢"}</div>
          <div>
            <div class="cat-name">${escHtml(c.name)}</div>
            <div class="cat-count">${(subsByCategory[c.id] || []).length} subcategories</div>
          </div>
        </a>
        <div class="sub-list">
          ${(subsByCategory[c.id] || []).map(s => `
            <a href="feed.html?category=${c.slug}&sub=${s.slug}" class="sub-item">${escHtml(s.name)}</a>
          `).join("")}
        </div>
      </div>
    `).join("");
  } catch (e) {
    document.getElementById("catGrid").innerHTML = `<div class="loading">Connection error: ${escHtml(e.message)}</div>`;
  }
}

load();
</script>
</body>
</html>
