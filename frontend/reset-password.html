<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password · Diwanet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css">
  <style>
    body { display: grid; place-items: center; min-height: 100vh; padding: 24px; }
    .auth-card {
      width: 100%; max-width: 420px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 24px; padding: 40px; box-shadow: var(--shadow-lg);
    }
    .auth-brand { margin-bottom: 32px; }
    h1 { font-family: 'DM Serif Display', serif; font-size: 1.9rem; margin-bottom: 6px; }
    .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 28px; }
    .footer-links { text-align: center; margin-top: 20px; font-size: 0.88rem; color: var(--muted); }
    .footer-links a { color: var(--accent); font-weight: 600; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-brand">
      <a href="index.html" class="brand">
        <div class="brand-mark">D</div>
        <span class="brand-name">Diwanet</span>
      </a>
    </div>

    <h1>New Password</h1>
    <p class="sub">Set a new, secure password for your account.</p>

    <div class="field">
      <label>New password</label>
      <input id="password" type="password" placeholder="At least 6 characters" />
    </div>

    <div class="field" style="margin-top:16px;">
      <label>Confirm password</label>
      <input id="password2" type="password" placeholder="Repeat your password" />
    </div>

    <button class="btn btn-primary btn-full btn-lg" id="resetBtn" onclick="doReset()" style="margin-top:20px;">Update password</button>

    <div class="msg" id="msg" style="margin-top:14px;"></div>

    <div class="divider"></div>

    <div class="footer-links"><a href="login.html">← Back to sign in</a></div>
  </div>

  <script src="assets/js/auth.js"></script>
  <script>
    function getResetToken() {
      return new URLSearchParams(window.location.search).get("token");
    }

    // Token yoksa hata ver
    if (!getResetToken()) {
      showMsg("Invalid or expired password reset link.", "error");
      document.getElementById("password").disabled = true;
      document.getElementById("password2").disabled = true;
      document.getElementById("resetBtn").disabled = true;
    }

    async function doReset() {
      const password = document.getElementById("password").value;
      const password2 = document.getElementById("password2").value;
      const btn = document.getElementById("resetBtn");
      const msg = document.getElementById("msg");
      const token = getResetToken();

      if (!token) {
        showMsg("Invalid reset token.", "error");
        return;
      }

      if (!password || password.length < 6) {
        showMsg("Password must be at least 6 characters.", "error");
        return;
      }

      if (password !== password2) {
        showMsg("Passwords do not match.", "error");
        return;
      }

      btn.disabled = true; btn.textContent = "Updating password...";
      msg.className = "msg";

      try {
        const res = await fetch(`${API}/api/auth/reset-password`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, password })
        });
        const data = await res.json();
        
        if (data.success) {
          showMsg("Password updated successfully! Redirecting to login...", "success");
          setTimeout(() => { window.location.href = "login.html"; }, 2000);
        } else {
          showMsg(data.error || "Reset failed. The link may have expired.", "error");
        }
      } catch (e) {
        showMsg("Connection failed: " + e.message, "error");
      } finally {
        btn.disabled = false; btn.textContent = "Update password";
      }
    }

    function showMsg(text, type) {
      const msg = document.getElementById("msg");
      msg.className = "msg " + type; msg.textContent = text;
    }

    document.addEventListener("keydown", e => { if (e.key === "Enter") doReset(); });
  </script>
</body>
</html>
