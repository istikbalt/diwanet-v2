<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Diwanet</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a href="index.html" class="brand">
        <div class="brand-mark">D</div>
        <span>Diwanet</span>
      </a>
    </div>
  </header>

  <div style="max-width:420px;margin:60px auto;padding:0 16px;">
    <div class="card" style="padding:32px;">
      <h2 style="margin:0 0 8px;font-size:1.4rem;">Set a new password</h2>
      <p style="margin:0 0 24px;color:#718096;font-size:0.9rem;">Enter your new password below.</p>

      <div class="field">
        <label>New password</label>
        <input id="password" type="password" placeholder="At least 6 characters" />
      </div>

      <div class="field" style="margin-top:12px;">
        <label>Confirm password</label>
        <input id="password2" type="password" placeholder="Repeat your password" />
      </div>

      <button class="btn btn-primary btn-full btn-lg" onclick="doReset()" style="margin-top:16px;">Update password</button>

      <div id="msg" style="margin-top:14px;font-size:0.88rem;text-align:center;display:none;"></div>
    </div>
  </div>

  <script>
    const API = "https://diwanet.com";

    function getToken() {
      return new URLSearchParams(window.location.search).get("token");
    }

    async function doReset() {
      const password = document.getElementById("password").value;
      const password2 = document.getElementById("password2").value;
      const msg = document.getElementById("msg");
      const token = getToken();

      if (!token) {
        msg.style.display = "block";
        msg.style.color = "#e53e3e";
        msg.textContent = "Invalid reset link.";
        return;
      }

      if (!password || password.length < 6) {
        msg.style.display = "block";
        msg.style.color = "#e53e3e";
        msg.textContent = "Password must be at least 6 characters.";
        return;
      }

      if (password !== password2) {
        msg.style.display = "block";
        msg.style.color = "#e53e3e";
        msg.textContent = "Passwords do not match.";
        return;
      }

      try {
        const res = await fetch(`${API}/api/auth/reset-password`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, password })
        });
        const data = await res.json();
        msg.style.display = "block";
        if (data.success) {
          msg.style.color = "#38a169";
          msg.textContent = "Password updated! Redirecting to login...";
          setTimeout(() => window.location.href = "login.html", 2000);
        } else {
          msg.style.color = "#e53e3e";
          msg.textContent = data.error || "Something went wrong.";
        }
      } catch(e) {
        msg.style.display = "block";
        msg.style.color = "#e53e3e";
        msg.textContent = "Connection error. Please try again.";
      }
    }
  </script>
</body>
</html>
