<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Business · Diwanet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" />
  <style>
    .wrap { max-width: 800px; margin: 0 auto; padding: 28px 24px 80px; }

    /* Cover + Logo preview */
    .profile-preview {
      background: white; border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      margin-bottom: 20px; box-shadow: var(--shadow);
    }
    .cover-area {
      height: 160px; position: relative; cursor: pointer;
      background: linear-gradient(135deg, var(--accent-light), #dbeafe);
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .cover-area img { width: 100%; height: 100%; object-fit: cover; }
    .cover-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,0.35);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.2s;
    }
    .cover-area:hover .cover-overlay { opacity: 1; }
    .upload-hint { color: white; font-size: 0.9rem; font-weight: 600; text-align: center; }
    .upload-hint span { display: block; font-size: 1.5rem; margin-bottom: 4px; }
    .logo-area {
      display: flex; align-items: flex-end; justify-content: space-between;
      padding: 0 24px 20px; margin-top: -40px;
    }
    .logo-wrap { position: relative; cursor: pointer; }
    .logo-circle {
      width: 80px; height: 80px; border-radius: 20px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      display: grid; place-items: center; font-size: 2rem; font-weight: 800;
      color: white; border: 4px solid white; box-shadow: var(--shadow-lg); overflow: hidden;
    }
    .logo-circle img { width: 100%; height: 100%; object-fit: cover; }
    .logo-badge {
      position: absolute; bottom: -4px; right: -4px; width: 26px; height: 26px;
      background: var(--accent); border-radius: 50%; display: grid; place-items: center;
      border: 2px solid white; font-size: 0.75rem; color: white;
    }
    .biz-preview-name { font-family: 'DM Serif Display', serif; font-size: 1.4rem; }
    .biz-preview-cat { font-size: 0.82rem; color: var(--muted2); margin-top: 2px; }

    /* Section cards */
    .section-card { background: white; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 16px; box-shadow: var(--shadow); }
    .section-head { padding: 14px 22px; border-bottom: 1px solid var(--border); background: var(--surface2); }
    .section-head h2 { font-size: 0.8rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; }
    .section-body { padding: 22px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    /* Upload area */
    .upload-area {
      border: 2px dashed var(--border); border-radius: var(--radius-sm); padding: 24px;
      text-align: center; cursor: pointer; transition: all 0.2s; position: relative;
    }
    .upload-area:hover { border-color: var(--accent); background: var(--accent-light); }
    .upload-area input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .upload-icon { font-size: 2rem; margin-bottom: 8px; }
    .upload-text { font-size: 0.88rem; color: var(--muted); }
    .upload-text strong { color: var(--accent); }
    .uploading-bar { height: 4px; background: var(--surface2); border-radius: 2px; margin-top: 10px; overflow: hidden; display: none; }
    .uploading-bar .bar { height: 100%; background: var(--accent); border-radius: 2px; animation: progress 1.5s ease-in-out infinite; }
    @keyframes progress { 0%{width:0%} 50%{width:70%} 100%{width:100%} }

    /* Save button */
    .save-btn {
      width: 100%; padding: 14px; border-radius: var(--radius-sm); border: none;
      background: var(--accent); color: white; font-size: 1rem; font-weight: 700;
      cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.2s; margin-top: 8px;
    }
    .save-btn:hover { background: var(--accent-dark); }
    .save-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Crop modal */
    .crop-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
    .crop-modal.open { display: flex; }
    .crop-container { width: 90vw; max-width: 1000px; height: 80vh; background: #000; border-radius: 12px; overflow: hidden; }
    .crop-container img { max-width: 100%; display: block; }
    .crop-actions { display: flex; gap: 12px; }
    .crop-btn { padding: 10px 24px; border-radius: 999px; font-size: 0.9rem; font-weight: 600; cursor: pointer; border: none; font-family: 'DM Sans', sans-serif; }
    .crop-confirm { background: var(--accent); color: white; }
    .crop-cancel { background: white; color: var(--text); }

    .field { display: flex; flex-direction: column; gap: 7px; margin-bottom: 16px; }
    .field:last-child { margin-bottom: 0; }

    @media (max-width: 600px) { .grid2 { grid-template-columns: 1fr; } .wrap { padding: 16px; } }
  </style>
</head>
<body>

<div class="crop-modal" id="cropModal">
  <div class="crop-container">
    <img id="cropImage" src="" alt="crop" />
  </div>
  <div class="crop-actions">
    <button class="crop-btn crop-confirm" onclick="confirmCrop()">Apply Crop</button>
    <button class="crop-btn crop-cancel" onclick="cancelCrop()">Cancel</button>
  </div>
</div>

<header class="topbar">
  <div class="topbar-inner">
    <a href="index.html" class="brand">
      <div class="brand-mark">D</div>
      <span class="brand-name">Diwanet</span>
    </a>
    <div style="display:flex;gap:8px;">
      <a id="viewPageBtn" href="#" class="btn btn-ghost btn-sm">View Page</a>
    </div>
  </div>
</header>

<div class="wrap">

  <div class="profile-preview">
    <div class="cover-area" id="coverArea" onclick="document.getElementById('coverInput').click()">
      <img id="coverPreview" src="" alt="" style="display:none;" />
      <div class="cover-overlay">
        <div class="upload-hint"><span>🖼️</span>Click to change cover</div>
      </div>
    </div>
    <div class="logo-area">
      <div class="logo-wrap" onclick="document.getElementById('logoInput').click()">
        <div class="logo-circle" id="logoCircle">
          <img id="logoPreview" src="" alt="" style="display:none;" />
          <span id="logoInitial">?</span>
        </div>
        <div class="logo-badge">✏️</div>
      </div>
      <div>
        <div class="biz-preview-name" id="previewName">Business Name</div>
        <div class="biz-preview-cat" id="previewCat"></div>
      </div>
    </div>
  </div>

  <div class="section-card">
    <div class="section-head"><h2>Logo / Profile Image</h2></div>
    <div class="section-body">
      <div class="upload-area">
        <input type="file" id="logoInput" accept="image/*" onchange="uploadImage('logo', this)" />
        <div class="upload-icon">🏢</div>
        <div class="upload-text">Click to upload logo<br><strong>JPG, PNG or WebP</strong> · Max 5MB</div>
        <div class="uploading-bar" id="logoBar"><div class="bar"></div></div>
      </div>
    </div>
  </div>

  <div class="section-card">
    <div class="section-head"><h2>Cover Photo</h2></div>
    <div class="section-body">
      <div class="upload-area">
        <input type="file" id="coverInput" accept="image/*" onchange="uploadImage('cover', this)" />
        <div class="upload-icon">🖼️</div>
        <div class="upload-text">Click to upload cover photo<br><strong>JPG, PNG or WebP</strong> · Recommended 1200×400</div>
        <div class="uploading-bar" id="coverBar"><div class="bar"></div></div>
      </div>
    </div>
  </div>

  <div class="section-card">
    <div class="section-head"><h2>Business Information</h2></div>
    <div class="section-body">
      <div class="field">
        <label>Business Name</label>
        <input id="business_name" placeholder="Your business name" oninput="updatePreview()" />
      </div>
      <div class="field">
        <label>Short Description</label>
        <textarea id="short_description" placeholder="Describe your business..."></textarea>
      </div>
      <div class="grid2">
        <div class="field">
          <label>City</label>
          <input id="city" placeholder="Toronto" />
        </div>
        <div class="field">
          <label>Country</label>
          <input id="country" placeholder="Canada" />
        </div>
        <div class="field">
          <label>Business Email</label>
          <input id="business_email" type="email" placeholder="contact@yourbusiness.com" />
        </div>
        <div class="field">
          <label>Business Phone</label>
          <input id="business_phone" placeholder="+1 (555) 000-0000" />
        </div>
      </div>
      <div class="field">
        <label>Website</label>
        <input id="website" placeholder="https://yourbusiness.com" />
      </div>
    </div>
  </div>

  <div class="section-card">
    <div class="section-head"><h2>Social Media</h2></div>
    <div class="section-body">
      <div class="grid2">
        <div class="field">
          <label>Instagram</label>
          <input id="instagram_url" placeholder="https://instagram.com/yourbusiness" />
        </div>
        <div class="field">
          <label>Facebook</label>
          <input id="facebook_url" placeholder="https://facebook.com/yourbusiness" />
        </div>
        <div class="field">
          <label>LinkedIn</label>
          <input id="linkedin_url" placeholder="https://linkedin.com/company/yourbusiness" />
        </div>
        <div class="field">
          <label>Twitter / X</label>
          <input id="twitter_url" placeholder="https://twitter.com/yourbusiness" />
        </div>
        <div class="field">
          <label>YouTube</label>
          <input id="youtube_url" placeholder="https://youtube.com/@yourbusiness" />
        </div>
        <div class="field">
          <label>TikTok</label>
          <input id="tiktok_url" placeholder="https://tiktok.com/@yourbusiness" />
        </div>
      </div>
    </div>
  </div>

  <button class="save-btn" id="saveBtn" onclick="saveProfile()">Save Changes</button>
  <div class="msg" id="msg" style="margin-top:12px;"></div>

</div>

<script src="assets/js/auth.js"></script>
<script>
const currentUser = getUser();
const currentBiz = getBusiness();
let currentSlug = "";
let logoUrl = null;
let coverUrl = null;

if (!currentUser || !currentBiz) window.location.href = "login.html";

function updatePreview() {
  const name = document.getElementById("business_name").value || "Business Name";
  document.getElementById("previewName").textContent = name;
  document.getElementById("logoInitial").textContent = name.charAt(0).toUpperCase();
}

function showMsg(text, type) {
  const msg = document.getElementById("msg");
  msg.className = "msg " + type;
  msg.textContent = text;
}

async function loadBusiness() {
  currentSlug = currentBiz.slug;
  document.getElementById("viewPageBtn").href = `business.html?slug=${currentSlug}`;
  try {
    const res = await fetch(`${API}/api/business/${currentSlug}`);
    const data = await res.json();
    if (!data.success) return;
    const b = data.business;

    document.getElementById("business_name").value = b.business_name || "";
    document.getElementById("short_description").value = b.short_description || "";
    document.getElementById("city").value = b.city || "";
    document.getElementById("country").value = b.country || "";
    document.getElementById("business_email").value = b.business_email || "";
    document.getElementById("business_phone").value = b.business_phone || "";
    document.getElementById("website").value = b.website || "";
    document.getElementById("instagram_url").value = b.instagram_url || "";
    document.getElementById("facebook_url").value = b.facebook_url || "";
    document.getElementById("linkedin_url").value = b.linkedin_url || "";
    document.getElementById("twitter_url").value = b.twitter_url || "";
    document.getElementById("youtube_url").value = b.youtube_url || "";
    document.getElementById("tiktok_url").value = b.tiktok_url || "";

    document.getElementById("previewName").textContent = b.business_name;
    document.getElementById("previewCat").textContent = b.category_name || "";
    document.getElementById("logoInitial").textContent = (b.business_name || "B").charAt(0).toUpperCase();

    if (b.logo_url) {
      logoUrl = b.logo_url;
      const img = document.getElementById("logoPreview");
      img.src = b.logo_url; img.style.display = "block";
      document.getElementById("logoInitial").style.display = "none";
    }
    if (b.cover_url) {
      coverUrl = b.cover_url;
      const img = document.getElementById("coverPreview");
      img.src = b.cover_url; img.style.display = "block";
    }
  } catch(e) { console.error(e); }
}

async function uploadImage(type, input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 10 * 1024 * 1024) { showMsg("File too large. Max 10MB.", "error"); return; }
  const croppedBlob = await openCrop(type, file);
  if (!croppedBlob) return;
  const barId = type === "logo" ? "logoBar" : "coverBar";
  document.getElementById(barId).style.display = "block";
  const formData = new FormData();
  formData.append("file", croppedBlob, "image.jpg");
  try {
    const res = await fetch(`${API}/api/upload`, { method: "POST", body: formData });
    const data = await res.json();
    if (data.url) {
      if (type === "logo") {
        logoUrl = data.url;
        const img = document.getElementById("logoPreview");
        img.src = logoUrl; img.style.display = "block";
        document.getElementById("logoInitial").style.display = "none";
      } else {
        coverUrl = data.url;
        const img = document.getElementById("coverPreview");
        img.src = coverUrl; img.style.display = "block";
      }
      showMsg(type === "logo" ? "Logo uploaded!" : "Cover uploaded!", "success");
    } else {
      showMsg("Upload failed.", "error");
    }
  } catch(e) { showMsg("Upload error: " + e.message, "error"); }
  document.getElementById(barId).style.display = "none";
}

async function saveProfile() {
  const btn = document.getElementById("saveBtn");
  btn.disabled = true; btn.textContent = "Saving...";
  const payload = {
    business_name: document.getElementById("business_name").value.trim(),
    short_description: document.getElementById("short_description").value.trim(),
    city: document.getElementById("city").value.trim(),
    country: document.getElementById("country").value.trim(),
    business_email: document.getElementById("business_email").value.trim(),
    business_phone: document.getElementById("business_phone").value.trim(),
    website: document.getElementById("website").value.trim(),
    instagram_url: document.getElementById("instagram_url").value.trim(),
    facebook_url: document.getElementById("facebook_url").value.trim(),
    linkedin_url: document.getElementById("linkedin_url").value.trim(),
    twitter_url: document.getElementById("twitter_url").value.trim(),
    youtube_url: document.getElementById("youtube_url").value.trim(),
    tiktok_url: document.getElementById("tiktok_url").value.trim(),
  };
  if (logoUrl) payload.logo_url = logoUrl;
  if (coverUrl) payload.cover_url = coverUrl;
  try {
    const res = await fetch(`${API}/api/business/${currentSlug}`, {
      method: "PUT", headers: authHeaders(), body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (data.success) {
      const biz = getBusiness();
      if (biz) { biz.business_name = data.business.business_name; localStorage.setItem("dn_business", JSON.stringify(biz)); }
      showMsg("Profile saved successfully!", "success");
      setTimeout(() => { window.location.href = `business.html?slug=${currentSlug}`; }, 1200);
    } else {
      showMsg(data.error || "Save failed.", "error");
    }
  } catch(e) { showMsg("Connection error: " + e.message, "error"); }
  btn.disabled = false; btn.textContent = "Save Changes";
}

loadBusiness();
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script>
let cropper = null;
let cropResolve = null;

function openCrop(type, file) {
  return new Promise((resolve) => {
    cropResolve = resolve;
    const reader = new FileReader();
    reader.onload = e => {
      const img = document.getElementById("cropImage");
      img.src = e.target.result;
      document.getElementById("cropModal").classList.add("open");
      if (cropper) cropper.destroy();
      cropper = new Cropper(img, {
        aspectRatio: type === "cover" ? 3.3 : 1,
        viewMode: 1,
        autoCropArea: 1,
      });
    };
    reader.readAsDataURL(file);
  });
}

function confirmCrop() {
  if (!cropper) return;
  cropper.getCroppedCanvas().toBlob(blob => {
    cropResolve(blob);
    cancelCrop();
  }, "image/jpeg", 0.9);
}

function cancelCrop() {
  document.getElementById("cropModal").classList.remove("open");
  if (cropper) { cropper.destroy(); cropper = null; }
  if (cropResolve) cropResolve(null);
}
</script>
</body>
</html>
