<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up · Diwanet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css">
  <style>
    body { display: grid; place-items: center; min-height: 100vh; padding: 24px; }
    .auth-card {
      width: 100%; max-width: 460px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 24px; padding: 40px; box-shadow: var(--shadow-lg);
    }
    .auth-brand { margin-bottom: 32px; }
    h1 { font-family: 'DM Serif Display', serif; font-size: 1.9rem; margin-bottom: 6px; }
    .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 28px; }

    .type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 28px; }
    .type-btn {
      padding: 20px 16px; border-radius: 16px; border: 2px solid var(--border);
      background: var(--surface2); cursor: pointer; text-align: center;
      transition: all 0.2s; font-family: 'DM Sans', sans-serif;
    }
    .type-btn:hover, .type-btn.active {
      border-color: var(--accent); background: var(--accent-light);
    }
    .type-icon { font-size: 2rem; margin-bottom: 10px; }
    .type-title { font-weight: 700; font-size: 0.95rem; color: var(--text); margin-bottom: 4px; }
    .type-desc { font-size: 0.78rem; color: var(--muted2); line-height: 1.4; }

    .form-section { display: none; }
    .form-section.visible { display: block; }

    .back-btn {
      background: none; border: none; color: var(--muted); font-size: 0.85rem;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
      margin-bottom: 20px; padding: 0; display: none;
    }
    .back-btn.visible { display: block; }
    .back-btn:hover { color: var(--accent); }

    .footer-links { text-align: center; margin-top: 16px; font-size: 0.88rem; color: var(--muted); }
    .footer-links a { color: var(--accent); font-weight: 600; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-brand">
      <a href="index.html" class="brand">
        <div class="brand-mark">D</div>
        <span class="brand-name">Diwanet</span>
      </a>
    </div>

    <button class="back-btn" id="backBtn" onclick="goBack()">← Back</button>
    <h1 id="pageTitle">Create account</h1>
    <p class="sub" id="pageSub">How will you use Diwanet?</p>

    <!-- Type selection -->
    <div class="type-grid" id="typeSelection">
      <button class="type-btn" onclick="selectType('individual')">
        <div class="type-icon">👤</div>
        <div class="type-title">Individual</div>
        <div class="type-desc">Follow businesses, like & comment</div>
      </button>
      <button class="type-btn" onclick="selectType('business')">
        <div class="type-icon">🏢</div>
        <div class="type-title">Business</div>
        <div class="type-desc">Create a page, share updates & grow</div>
      </button>
    </div>

    <!-- Individual form -->
    <div class="form-section" id="individualForm">
      <div class="form-grid" style="margin-bottom:16px;">
        <div class="field" style="margin-bottom:0;">
          <label>First name</label>
          <input id="first_name" placeholder="John" />
        </div>
        <div class="field" style="margin-bottom:0;">
          <label>Last name</label>
          <input id="last_name" placeholder="Smith" />
        </div>
      </div>
      <div class="field">
        <label>Email address</label>
        <input id="email" type="email" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label>Password</label>
        <input id="password" type="password" placeholder="Choose a strong password" />
      </div>
      <div class="field">
        <label>Phone <span class="optional">(optional)</span></label>
        <input id="phone" placeholder="+1 (555) 000-0000" />
      </div>
      <button class="btn btn-primary btn-full btn-lg" id="regBtn" onclick="doRegister()" style="margin-top:4px;">Create account</button>
      <div class="msg" id="msg" style="margin-top:14px;"></div>
    </div>

    <div class="divider"></div>
    <div class="footer-links">Already have an account? <a href="login.html">Sign in</a></div>
    <div class="footer-links" style="margin-top:8px;"><a href="index.html" style="color:var(--muted);font-weight:400;">← Back to home</a></div>
  </div>

  <script src="assets/js/auth.js"></script>
  <script>
    if (getToken()) window.location.href = "feed.html";

    function selectType(type) {
      document.getElementById("typeSelection").style.display = "none";
      document.getElementById("backBtn").classList.add("visible");
      if (type === "individual") {
        document.getElementById("pageTitle").textContent = "Create individual account";
        document.getElementById("pageSub").textContent = "Follow businesses and engage with their content.";
        document.getElementById("individualForm").classList.add("visible");
      } else {
        window.location.href = "create-business.html";
      }
    }

    function goBack() {
      document.getElementById("typeSelection").style.display = "grid";
      document.getElementById("backBtn").classList.remove("visible");
      document.getElementById("individualForm").classList.remove("visible");
      document.getElementById("pageTitle").textContent = "Create account";
      document.getElementById("pageSub").textContent = "How will you use Diwanet?";
    }

    async function doRegister() {
      const btn = document.getElementById("regBtn");
      const first_name = document.getElementById("first_name").value.trim();
      const last_name = document.getElementById("last_name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const phone = document.getElementById("phone").value.trim();

      if (!first_name || !last_name || !email || !password) {
        showMsg("Please fill in all required fields.", "error"); return;
      }

      btn.disabled = true; btn.textContent = "Creating account...";

      try {
        const res = await fetch(`${API}/api/auth/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ first_name, last_name, email, password, phone })
        });
        const data = await res.json();
        if (!data.success) {
          showMsg(data.error || "Registration failed.", "error");
        } else {
          setAuth(data.token, data.user, null);
          showMsg("Account created! Redirecting...", "success");
          setTimeout(() => { window.location.href = "feed.html"; }, 800);
        }
      } catch (e) {
        showMsg("Connection failed: " + e.message, "error");
      } finally {
        btn.disabled = false; btn.textContent = "Create account";
      }
    }

    function showMsg(text, type) {
      const msg = document.getElementById("msg");
      msg.className = "msg " + type; msg.textContent = text;
    }
  </script>
</body>
</html>
