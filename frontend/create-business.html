<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Business Page · Diwanet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css">
  <style>
    .wrap { max-width: 860px; margin: 0 auto; padding: 40px 24px 80px; }
    .page-header { margin-bottom: 28px; }
    .page-header h1 { font-family: 'DM Serif Display', serif; font-size: 2rem; letter-spacing: -0.02em; margin-bottom: 6px; }
    .page-header p { color: var(--muted); }
    .section-card { background: white; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 20px; box-shadow: var(--shadow); }
    .section-head { padding: 16px 22px; border-bottom: 1px solid var(--border); background: var(--surface2); }
    .section-head h2 { font-size: 0.92rem; font-weight: 700; }
    .section-body { padding: 22px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .full { grid-column: 1 / -1; }
    .actions { display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap; }
    .slug-preview { font-size: 0.78rem; color: var(--muted2); margin-top: 4px; }
    .slug-preview span { color: var(--accent); font-weight: 600; }
    @media (max-width: 640px) { .grid2 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <a href="index.html" class="brand">
      <div class="brand-mark">D</div>
      <span class="brand-name">Diwanet</span>
    </a>
    <div class="topbar-actions" id="authArea"></div>
  </div>
</header>

<div class="wrap">
  <div class="page-header">
    <h1>Create Business Page</h1>
    <p>Register a business owner and publish the first version of the business page.</p>
  </div>

  <form id="businessForm">
    <div class="section-card">
      <div class="section-head"><h2>Owner Information</h2></div>
      <div class="section-body">
        <div class="grid2">
          <div class="field">
            <label for="owner_first_name">First Name</label>
            <input id="owner_first_name" name="owner_first_name" required />
          </div>
          <div class="field">
            <label for="owner_last_name">Last Name</label>
            <input id="owner_last_name" name="owner_last_name" required />
          </div>
          <div class="field">
            <label for="owner_email">Owner Email</label>
            <input id="owner_email" name="owner_email" type="email" required />
          </div>
          <div class="field">
            <label for="owner_password">Password</label>
            <input id="owner_password" name="owner_password" type="password" required />
          </div>
          <div class="field full">
            <label for="owner_phone">Owner Phone <span class="optional">(optional)</span></label>
            <input id="owner_phone" name="owner_phone" />
          </div>
        </div>
      </div>
    </div>

    <div class="section-card">
      <div class="section-head"><h2>Business Information</h2></div>
      <div class="section-body">
        <div class="grid2">
          <div class="field">
            <label for="business_name">Business Name</label>
            <input id="business_name" name="business_name" required />
          </div>
          <div class="field">
            <label for="slug">Page URL Slug</label>
            <input id="slug" name="slug" required />
            <div class="slug-preview">diwanet.com/business.html?slug=<span id="slugPreview">my-business</span></div>
          </div>
          <div class="field">
            <label for="category_id">Category</label>
            <select id="category_id" name="category_id" required onchange="loadSubcategories(this.value)">
              <option value="">Loading categories...</option>
            </select>
          </div>
          <div class="field">
            <label for="subcategory_id">Sub Category <span class="optional">(optional)</span></label>
            <select id="subcategory_id" name="subcategory_id">
              <option value="">Select a category first</option>
            </select>
          </div>
          <div class="field full">
            <label for="short_description">Short Description</label>
            <textarea id="short_description" name="short_description" required placeholder="Tell people what your business does..."></textarea>
          </div>
          <div class="field">
            <label for="country">Country</label>
            <input id="country" name="country" value="Canada" required />
          </div>
          <div class="field">
            <label for="city">City</label>
            <input id="city" name="city" required />
          </div>
          <div class="field">
            <label for="business_email">Business Email <span class="optional">(optional)</span></label>
            <input id="business_email" name="business_email" type="email" />
          </div>
          <div class="field">
            <label for="business_phone">Business Phone <span class="optional">(optional)</span></label>
            <input id="business_phone" name="business_phone" />
          </div>
        </div>
      </div>
    </div>

    <div class="msg" id="message"></div>

    <div class="actions">
      <button type="submit" class="btn btn-primary btn-lg">Create Business Page</button>
      <a href="index.html" class="btn btn-ghost btn-lg">Back to Home</a>
    </div>
  </form>
</div>

<script src="assets/js/auth.js"></script>
<script>
renderTopbarAuth("authArea");

const form = document.getElementById("businessForm");
const messageBox = document.getElementById("message");
const businessNameInput = document.getElementById("business_name");
const slugInput = document.getElementById("slug");

businessNameInput.addEventListener("input", () => {
  if (!slugInput.dataset.touched) {
    slugInput.value = makeSlug(businessNameInput.value);
    document.getElementById("slugPreview").textContent = slugInput.value || "my-business";
  }
});

slugInput.addEventListener("input", () => {
  slugInput.dataset.touched = "true";
  slugInput.value = makeSlug(slugInput.value);
  document.getElementById("slugPreview").textContent = slugInput.value || "my-business";
});

async function loadSubcategories(categoryId) {
  const select = document.getElementById("subcategory_id");
  if (!categoryId) { select.innerHTML = '<option value="">Select a category first</option>'; return; }
  select.innerHTML = '<option value="">Loading...</option>';
  try {
    const res = await fetch(`${API}/api/categories/subcategories/${categoryId}`);
    const result = await res.json();
    if (!result.success) { select.innerHTML = '<option value="">Could not load</option>'; return; }
    select.innerHTML = '<option value="">Select sub category (optional)</option>';
    result.subcategories.forEach(s => {
      const option = document.createElement("option");
      option.value = s.id; option.textContent = s.name;
      select.appendChild(option);
    });
  } catch { select.innerHTML = '<option value="">Error loading</option>'; }
}

async function loadCategories() {
  const select = document.getElementById("category_id");
  try {
    const res = await fetch(`${API}/api/categories`);
    const result = await res.json();
    if (!res.ok || !result.success) { select.innerHTML = '<option value="">Could not load categories</option>'; return; }
    select.innerHTML = '<option value="">Select</option>';
    result.categories.forEach(c => {
      const option = document.createElement("option");
      option.value = c.id; option.textContent = c.name;
      select.appendChild(option);
    });
  } catch { select.innerHTML = '<option value="">Server connection failed</option>'; }
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  messageBox.className = "msg"; messageBox.textContent = "";

  const payload = {
    owner_first_name: document.getElementById("owner_first_name").value.trim(),
    owner_last_name: document.getElementById("owner_last_name").value.trim(),
    owner_email: document.getElementById("owner_email").value.trim(),
    owner_password: document.getElementById("owner_password").value.trim(),
    owner_phone: document.getElementById("owner_phone").value.trim(),
    business_name: document.getElementById("business_name").value.trim(),
    slug: document.getElementById("slug").value.trim(),
    subcategory_id: document.getElementById("subcategory_id").value,
    category_id: document.getElementById("category_id").value,
    short_description: document.getElementById("short_description").value.trim(),
    country: document.getElementById("country").value.trim(),
    city: document.getElementById("city").value.trim(),
    business_email: document.getElementById("business_email").value.trim(),
    business_phone: document.getElementById("business_phone").value.trim()
  };

  try {
    const res = await fetch(`${API}/api/business/register`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    const text = await res.text();
    let result = {};
    try { result = JSON.parse(text); } catch { result = { error: text }; }

    if (!res.ok) {
      messageBox.className = "msg error"; messageBox.textContent = result.error || "Something went wrong."; return;
    }

    messageBox.className = "msg success"; messageBox.textContent = "Business page created successfully. Redirecting...";

    if (result.token) {
      setAuth(result.token, { id: result.user_id, role: "business_owner" }, { id: result.business_id, slug: result.slug });
    }

    setTimeout(() => { window.location.href = `business.html?slug=${result.slug}`; }, 900);
  } catch (error) {
    messageBox.className = "msg error"; messageBox.textContent = "Server connection failed: " + error.message;
  }
});

loadCategories();
</script>
</body>
</html>
